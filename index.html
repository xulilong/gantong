<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>感统课日历与趋势</title>
<style>
:root{--ink:#152238;--muted:#64748b;--line:#d9e2ec;--paper:#f7fafc;--blue:#2563eb;--green:#059669;--red:#dc2626;--amber:#d97706;--violet:#7c3aed;--panel:#ffffff;--soft:#eef6ff;--soft2:#f0fdf4;--soft3:#fff7ed;}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:var(--ink);background:#f4f7fb;line-height:1.55} button{font:inherit;color:inherit} .app{min-height:100vh;display:grid;grid-template-columns:360px 1fr}.side{background:#fff;border-right:1px solid var(--line);padding:22px;position:sticky;top:0;height:100vh;overflow:auto}.main{padding:24px;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}.mark{width:42px;height:42px;border-radius:8px;background:#1d4ed8;color:#fff;display:grid;place-items:center;font-weight:800}.brand h1{font-size:21px;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:13px}.toolbar{display:flex;gap:8px;margin:14px 0 18px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}.btn.primary{background:#172033;color:#fff;border-color:#172033}.btn:hover{border-color:#94a3b8}.month{margin:16px 0 22px}.month h2{font-size:15px;margin:0 0 10px;display:flex;justify-content:space-between;align-items:center}.week,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.week span{text-align:center;font-size:12px;color:var(--muted);padding:2px}.day{height:42px;border:1px solid transparent;background:transparent;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;color:#94a3b8}.day.has{background:#eef6ff;border-color:#bfdbfe;color:#1e3a8a;font-weight:700;cursor:pointer}.day.has:after{content:"";position:absolute;bottom:5px;width:5px;height:5px;border-radius:50%;background:#2563eb}.day.selected{background:#172033;color:white;border-color:#172033}.day.selected:after{background:#fff}.legend{display:grid;gap:9px;font-size:13px;color:var(--muted);padding-top:12px;border-top:1px solid var(--line)}.legend i{display:inline-block;width:12px;height:12px;border-radius:4px;margin-right:7px;vertical-align:-1px}.summary-grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px;margin-bottom:18px}.metric{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}.metric b{display:block;font-size:24px;margin-bottom:2px}.metric span{color:var(--muted);font-size:13px}.hero{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:16px}.hero h2{margin:0 0 8px;font-size:22px}.hero p{margin:0;color:#475569}.layout{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(320px,.65fr);gap:16px}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px}.panel h3{margin:0 0 12px;font-size:17px}.section-title{display:flex;justify-content:space-between;gap:12px;align-items:center}.tag{border-radius:999px;background:#f1f5f9;color:#334155;font-size:12px;padding:3px 8px;white-space:nowrap}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:#fff;font-size:12px}.chart{width:100%;height:260px}.chart.small{height:180px}.records{display:grid;gap:12px}.record-card{border:1px solid var(--line);border-radius:8px;padding:13px;background:#fff}.record-card h4{margin:0 0 8px}.record-card p{margin:0;color:#475569}.project{border-top:1px solid #e5edf5;padding:12px 0}.project:first-child{border-top:0;padding-top:0}.project h4{margin:0 0 6px}.project dl{display:grid;grid-template-columns:72px 1fr;gap:5px 10px;margin:0;font-size:14px}.project dt{color:var(--muted)}.project dd{margin:0}.twocol{display:grid;grid-template-columns:1fr 1fr;gap:12px}.list{margin:0;padding-left:20px}.list li{margin:6px 0}.advice{display:grid;gap:10px}.advice-item{border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:8px;padding:11px;background:#fff}.advice-item.green{border-left-color:var(--green)}.advice-item.amber{border-left-color:var(--amber)}.advice-item b{display:block;margin-bottom:3px}.compare{display:grid;gap:10px}.compare-row{display:grid;grid-template-columns:150px 1fr 1fr;gap:10px;border-bottom:1px solid #edf2f7;padding-bottom:10px}.compare-row:last-child{border-bottom:0}.compare-row b{color:#0f172a}.empty{color:var(--muted);text-align:center;padding:24px;border:1px dashed var(--line);border-radius:8px}.footer-note{font-size:12px;color:var(--muted);margin-top:10px}.modebar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 10px;font-size:13px;cursor:pointer}.pill.active{background:#172033;color:#fff;border-color:#172033}@media(max-width:980px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.layout,.summary-grid,.twocol{grid-template-columns:1fr}.main{padding:16px}.chart{height:220px}}@media print{.side,.toolbar,.modebar{display:none}.app{display:block}.main{padding:0}.panel,.hero,.metric{break-inside:avoid}}
</style>
<style>
 .report-hero{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-bottom:16px}.report-card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:15px}.report-card h3{margin:0 0 10px}.verdict{display:grid;gap:10px}.verdict-item{display:grid;grid-template-columns:96px 1fr;gap:10px;align-items:start}.verdict-item b{color:#0f172a}.verdict-item span{color:#475569}.strength-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.strength-card{border:1px solid #bbf7d0;background:#f0fdf4;border-radius:8px;padding:13px}.strength-card b{display:block;font-size:16px;margin-bottom:5px;color:#14532d}.strength-card strong{display:block;font-size:22px;color:#166534;margin-bottom:5px}.strength-card span{display:block;color:#475569;font-size:14px}.domain-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.domain-card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:14px}.domain-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}.domain-head h3{margin:0;font-size:17px}.level{border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;white-space:nowrap}.level.high{background:#fee2e2;color:#991b1b}.level.mid{background:#fff7ed;color:#9a3412}.level.normal{background:#dcfce7;color:#166534}.score-row{display:grid;grid-template-columns:92px 1fr;gap:8px;align-items:center;margin:8px 0 12px;color:#64748b;font-size:13px}.score-row strong{grid-column:1/-1;color:#0f172a;background:#f8fafc;border-radius:8px;padding:7px 9px}.score-track{height:9px;border-radius:999px;background:#e2e8f0;overflow:hidden}.score-fill{height:100%;border-radius:999px;background:#2563eb}.score-fill.high{background:#dc2626}.score-fill.mid{background:#d97706}.domain-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}.note-box{border-radius:8px;background:#f8fafc;border:1px solid #e2e8f0;padding:10px}.note-box b{display:block;margin-bottom:4px;color:#0f172a}.note-box span{color:#475569;font-size:14px}.action-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.action-card{border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:8px;background:#fff;padding:12px}.action-card.green{border-left-color:var(--green)}.action-card.amber{border-left-color:var(--amber)}.action-card b{display:block;margin-bottom:6px}
@media(max-width:700px){
  .side{padding:18px 14px}
  .brand{margin-bottom:14px}
  .brand h1{font-size:19px}
  .toolbar{margin:10px 0 14px}
  .month{margin:12px 0 16px}
  .week,.grid{gap:4px}
  .day{height:34px;border-radius:8px}
  .day.has:after{bottom:3px}
  .main{padding:12px}
  .hero{padding:14px}
  .hero h2{font-size:19px}
  .metric b{font-size:20px}
  .panel{padding:14px}
  .chart{height:200px}
  .compare-row{grid-template-columns:1fr}
  .project dl{grid-template-columns:64px 1fr}
  .report-hero,.strength-grid,.domain-grid,.domain-cols,.action-strip{grid-template-columns:1fr}
  .verdict-item{grid-template-columns:1fr}
}
</style>
<style>
/* Visual refresh: calmer desktop, app-like mobile. */
:root{
  --bg:#eef3f8;
  --card-shadow:0 10px 28px rgba(15,35,65,.07);
  --card-shadow-soft:0 6px 18px rgba(15,35,65,.05);
}
html{scroll-behavior:smooth}
body{background:var(--bg);overflow-x:hidden}
.side{box-shadow:12px 0 32px rgba(15,35,65,.04)}
.mark{background:#1f5eff;box-shadow:0 10px 22px rgba(37,99,235,.24)}
.btn,.pill{transition:background .18s ease,border-color .18s ease,transform .18s ease,box-shadow .18s ease}
.btn:active,.pill:active,.day.has:active{transform:scale(.97)}
.hero,.metric,.panel,.report-card,.domain-card{border-color:#dbe6f2;box-shadow:var(--card-shadow-soft)}
.hero{box-shadow:var(--card-shadow)}
.metric{min-height:106px}
.metric strong{font-size:18px}
.pill.active,.btn.primary{background:#111827;border-color:#111827;box-shadow:0 8px 18px rgba(17,24,39,.14)}
.day.has{box-shadow:inset 0 0 0 1px rgba(37,99,235,.04)}
.day.selected{box-shadow:0 8px 18px rgba(17,24,39,.18)}
.panel h3,.domain-head h3{letter-spacing:0}
.chart{display:block;max-width:100%}
.chart-point,.chart-bar{cursor:pointer}
.month-switch{display:grid;grid-template-columns:42px 1fr 42px;gap:8px;margin:8px 0 12px}
.month-switch button,.month-switch select{height:38px;border:1px solid var(--line);border-radius:10px;background:#fff;color:#0f172a;font:inherit;font-weight:700;text-align:center}
.month-switch button{cursor:pointer}
.month-switch button:disabled{opacity:.35;cursor:not-allowed}
.chart-note{margin:-4px 0 8px;color:#64748b;font-size:13px}
.chart-point-hit{cursor:pointer;fill:transparent}
.chart-point.active{stroke:#111827;stroke-width:3}
#chartTip{position:fixed;z-index:50;display:none;max-width:220px;border:1px solid #dbe6f2;border-radius:12px;background:#fff;padding:9px 11px;box-shadow:0 14px 34px rgba(15,35,65,.18);font-size:13px;color:#0f172a;pointer-events:none}
#chartTip b{display:block;margin-bottom:2px}
#chartTip span{color:#64748b}

@media(max-width:700px){
  *{min-width:0}
  body{background:#f6f8fb}
  html,body{width:100%;max-width:100%;overflow-x:hidden}
  .app{display:block;min-height:100vh;width:100%;max-width:100vw;overflow-x:hidden}
  .side{position:relative;height:auto;width:100%;max-width:100vw;overflow:hidden;border-right:0;border-bottom:1px solid #dde7f2;box-shadow:none;background:#f6f8fb;padding:14px 12px 10px}
  .brand{background:#fff;border:1px solid #e1e9f3;border-radius:16px;padding:12px;box-shadow:var(--card-shadow-soft);gap:10px}
  .mark{width:38px;height:38px;border-radius:12px}
  .brand h1{font-size:18px}
  .brand p{font-size:12px}
  .toolbar{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;margin:12px 0;width:100%}
  .btn{height:42px;border-radius:12px;font-weight:700}
  .month-switch{grid-template-columns:44px 1fr 44px}
  .month-switch button,.month-switch select{height:42px;border-radius:12px}
  .month{background:#fff;border:1px solid #e1e9f3;border-radius:16px;padding:12px;margin:10px 0;box-shadow:var(--card-shadow-soft)}
  .month h2{font-size:15px;margin-bottom:9px}
  #calendars{width:100%;max-width:100%;overflow:hidden}
  .week,.grid{grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;width:100%}
  .week span{font-size:11px}
  .day{height:32px;border-radius:10px;font-size:14px;min-width:0}
  .day.has{background:#edf5ff;color:#1d4ed8}
  .day.selected{background:#111827;color:#fff}
  .legend{grid-template-columns:1fr 1fr 1fr;gap:6px;width:100%;border-top:0;background:#fff;border:1px solid #e1e9f3;border-radius:14px;padding:10px;font-size:11px}
  .legend i{margin-right:4px}
  .main{width:100%;max-width:100vw;overflow:hidden;padding:12px 12px 88px}
  .hero{border:0;border-radius:18px;padding:16px;box-shadow:var(--card-shadow);margin-bottom:12px}
  .hero h2{font-size:20px;line-height:1.25;margin-bottom:6px}
  .hero p{font-size:13px;line-height:1.5}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .metric{border:0;border-radius:16px;padding:13px;min-height:96px;box-shadow:var(--card-shadow-soft)}
  .metric b{font-size:13px;color:#64748b;margin:0 0 8px}
  .metric strong{display:block;font-size:22px;line-height:1.1;color:#0f172a}
  .metric span{font-size:12px}
  .modebar{position:sticky;top:0;z-index:20;background:rgba(246,248,251,.94);backdrop-filter:blur(12px);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 -12px 12px;padding:8px 12px;border-bottom:1px solid #e5edf5}
  .pill{border-radius:12px;padding:9px 6px;font-size:12px;white-space:nowrap;text-align:center}
  .panel,.report-card,.domain-card{border:0;border-radius:18px;padding:15px;box-shadow:var(--card-shadow-soft);margin-bottom:12px}
  .panel h3{font-size:16px;margin-bottom:10px}
  .section-title{align-items:flex-start}
  .tag{font-size:11px}
  .layout,.twocol,.report-hero,.strength-grid,.domain-grid,.domain-cols,.action-strip{grid-template-columns:1fr;gap:12px}
  .chart{height:190px}
  .chart.small{height:160px}
  #chartTip{left:12px!important;right:12px;top:auto!important;bottom:18px;max-width:none;padding:12px 14px;font-size:14px}
  .chips{gap:6px}
  .chip{font-size:11px;padding:5px 8px;background:#f8fafc}
  .record-card,.project,.note-box,.advice-item,.action-card,.strength-card{border-radius:14px}
  .project{padding:11px 0}
  .project dl{grid-template-columns:58px 1fr;font-size:13px}
  .list{padding-left:18px}
  .list li{margin:5px 0}
  .verdict-item{grid-template-columns:1fr;gap:3px;border-bottom:1px solid #edf2f7;padding-bottom:8px}
  .verdict-item:last-child{border-bottom:0;padding-bottom:0}
  .strength-card{padding:13px}
  .strength-card strong{font-size:20px}
  .score-row{grid-template-columns:78px 1fr}
  .compare-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="mark">感</div><div><h1>墩墩感统课</h1><p>日历、课堂记录与趋势建议</p></div></div>
    <div class="toolbar"><button class="btn primary" id="selectAll">全部课程</button><button class="btn" id="clearSel">清空选择</button></div>
    <div class="month-switch" id="monthSwitch"></div>
    <div id="calendars"></div>
    <div class="legend"><div><i style="background:#eef6ff;border:1px solid #bfdbfe"></i>有上课记录</div><div><i style="background:#172033"></i>当前选择</div><div><i style="background:#f8fafc;border:1px solid #e2e8f0"></i>无课程</div></div>
  </aside>
  <main class="main">
    <div class="hero"><h2 id="viewTitle">全部课程趋势总结</h2><p id="viewSubtitle">默认展示所有已记录日期；选择日历日期后可查看单日详情或多日趋势。</p></div>
    <div class="summary-grid" id="summaryMetrics"></div>
    <div class="modebar"><button class="pill active" data-mode="trend">趋势总结</button><button class="pill" data-mode="detail">课堂详情</button><button class="pill" data-mode="advice">家园建议</button><button class="pill" data-mode="report">评估对照</button></div>
    <section id="content"></section>
  </main>
</div>
<script>
const records=[{"date":"2026-05-30","title":"05月30日","overview":"本节课为墩墩第一次感统课，主要目标是熟悉环境、建立初步关系，并观察墩墩的兴趣偏好和课堂配合方式。课前老师先带墩墩熟悉教室环境，寻找他喜欢的玩具，并将这些玩具作为后续任务的强化物，用来激励他完成任务后获得奖励。\n本节观察到墩墩对部分玩具的兴趣持续时间较短，需要较频繁更换强化物。最开始使用小猪佩奇，后续逐渐换成小球、绿色物品等。墩墩对绿色物品兴趣明显较高，后续课程可多使用绿色相关物品提高参与度。整体上，墩墩能配合完成部分任务，但自己的想法较多，教室内跑跳行为较多，也出现 1 次用手里的小猪拍老师头的行为，后续需要继续建立课堂规则。","projects":[{"item":"抓圈 / 追圈","result":"成功抓到 5 个小圈","performance":"训练手眼协调和视觉追视。刚开始墩墩拿到自己选的小圈后不太愿意放下或推出去，可能尚未理解老师要求，也可能更想拿着圈。老师改用“把圈挂到墙上”的方式迂回引导，墩墩能同意先把圈抓回来再挂墙上。老师将圈竖着滚出去后，墩墩能跑过去抓住并带回，成功抓到 5 个小圈。但 5 次抓圈后都出现立刻扑到地上或倒在地上的行为。","focus":"后续练习站着抓圈，抓完后站稳并跑回，减少扑地或倒地。"},{"item":"荡秋千奖励","result":"作为休息和强化物","performance":"抓圈后用荡秋千作为奖励。老师让墩墩自己选择“快快荡”还是“慢慢荡”，再根据他的表达调整速度。墩墩比较喜欢荡秋千。","focus":"可继续作为有效强化物，并训练用语言表达想要的速度。"},{"item":"推装榴莲饼的小车","result":"辅助下完成","performance":"墩墩看到旁边绿色榴莲饼后很喜欢。老师设计情境：把榴莲饼拿给猪妈妈吃；因两个榴莲饼拿不了，引导墩墩推小车装饼。单独推空车时较稳，但速度偏快；装上两个榴莲饼后，小车摇晃较明显，需要老师辅助扶车。进教室过程中跑跳较多。","focus":"继续练习推车速度控制和上肢力量控制，装物后先保证稳定。"},{"item":"俯冲滑板","result":"共 4 次左右","performance":"用“给猪妈妈找小被子和小枕头”的情境完成前庭觉刺激输入。墩墩趴在滑板车上，前 3 次采用小手背在身后的姿势，因为墩墩表示之前冲滑板就是这样做；另有 1 次因想抓东西，小手放到前面。过程中有低头情况，需要提示抬头。老师希望通过抬头和“小燕飞”姿势提升核心力量。","focus":"继续加入前庭觉游戏，练习趴滑板时头抬高，逐步建立正确姿势。"},{"item":"抛接球","result":"成功抛 5 个","performance":"老师站在墩墩对面约 1 米位置进行抛接球，完成数量较少，成功抛 5 个。过程中墩墩会有自己的想法，例如球抛完后跑走，并说“你碰到我的开关了，我就要跑掉了”。","focus":"继续练习近距离抛接，提高互动持续性和规则感。"},{"item":"走平衡木","result":"辅助下完成","performance":"老师拉着墩墩的手走平衡木，并尝试提醒他松手自己走。墩墩用自己的想象回应，例如说拉手的地方是“插电的”，没有电就走不了。说明他能参与任务，但会用自己的想法影响任务进行。","focus":"后续逐步减少手部辅助，先建立按任务要求完成的规则。"}],"strengths":["第一次上课整体能够完成多项低难度任务，环境适应尚可。","对绿色物品兴趣明显，可作为后续强化和任务材料线索。","抓圈能成功抓到 5 个，具备一定视觉追视和快速反应基础。","喜欢荡秋千，可作为有效奖励。","俯冲滑板、推小车、抛接球、平衡木等任务在辅助或情境引导下可参与。"],"issues":["强化物兴趣持续时间较短，需要频繁更换。","拿到喜欢的物品后不容易放手，需要迂回引导或明确交换规则。","抓圈后会扑到地上或倒地，需要建立站着抓、站着返回的规则。","教室内跑跳行为较多，有前庭觉寻求表现，需要加入合适的前庭觉游戏。","做任务时自己的想法较多，容易偏离老师要求。","出现 1 次用手里的小猪拍老师头的行为，需要明确身体边界和安全规则。"],"next":["继续以环境适应和规则建立为主，任务难度不宜过高。","多使用绿色物品、小球、小猪佩奇、荡秋千等偏好物作为强化。","抓圈和追球类任务重点练习视觉追视、快速抓取，以及抓完站好返回。","推小车继续练习速度控制和装物后的稳定性。","俯冲滑板继续作为前庭觉输入活动，并逐步要求头抬高。","开始建立课堂基础规则：拿到物品后按要求放回、不能随意跑跳、不能拍老师。"]},{"date":"2026-06-03","title":"06月03日","overview":"本节课墩墩整体表现比第一节课好很多，尤其在做任务时配合度有所提升。相比之前拿到东西后不愿放手，本节课老师提前说明“先做什么任务，再拿什么”，墩墩多数情况下可以接受。当前仍处于规则感建立早期，墩墩有自己的想法，听到规则或指令时有时会表达“不要”等反应，因此后续仍需要用简单任务、快速指令和明确规则来提高配合度。\n本节主要完成滑板车、追球、镊子夹毛球结合跳触觉圆盘等活动。其中追球活动墩墩比较喜欢，完成度较高。","projects":[{"item":"滑板车俯冲 + 推球","result":"前 5 组俯冲，后 2 组推球","performance":"墩墩整体完成不错，但刚开始会故意趴在滑板车上，不愿把下巴和头抬高。老师多次提醒“只有头抬高，滑板车才能动”，墩墩能抬起来一会儿，但滑行过程中又会趴下。第一次因不听指令耽误较久，老师告知滑板车游戏时间到了，需要先休息。第二次再做滑板车前，老师提前说明只有 5 分钟游戏时间，需要快速完成；这次墩墩能主动说自己已经抬起来、没有趴下，表现较好。","focus":"继续用限时和明确姿势要求训练抬头俯冲，减少趴在滑板车上的情况。"},{"item":"追球训练","result":"第 2 组抓 5 个绿色球","performance":"老师把球扔出去，墩墩需要快速追球、抓住后放进旁边小篮子。墩墩很喜欢该活动，完成特别好。第 1 组单纯抓绿色球；第 2 组老师同时扔出两个不同颜色的球，但目标仍是抓绿色球，墩墩能快速从两个颜色中抓出绿色球。","focus":"后续可继续使用追球作为高兴趣任务，并逐步增加颜色指令难度。"},{"item":"镊子夹毛球 + 跳触觉圆盘","result":"完成较好","performance":"要求墩墩用前三指捏镊子夹毛球。刚开始墩墩会用 5 个手指或前 4 个手指捏，需要老师调整姿势。夹好毛球后，需要边夹球边向前跳触觉圆盘，最后把小球放到触觉圆盘上。夹球整体不错，偶尔姿势会变，需要及时调整。跳跃中会出现前后脚落地，即使老师拉手辅助也会有该情况；后期老师从双手辅助逐渐松手，墩墩可以做到双脚同时跳、同时落地。","focus":"继续练习前三指捏镊子；跳跃时强化双脚同时起跳和同时落地。"}],"strengths":["整体配合度比第一节课明显提高。","能接受“先完成任务，再拿想要的东西”的安排。","追球活动兴趣高，能快速追球并放入小篮子。","在两个颜色球同时出现时，能按要求抓绿色球。","镊子夹毛球整体完成不错，经过调整后能改善手指姿势。","跳触觉圆盘在逐步减少辅助后，可以做到双脚同时跳和同时落地。"],"issues":["滑板车俯冲时容易趴下，抬头姿势维持不稳定。","面对规则和指令时仍会表达自己的想法，有时会说“不要”。","镊子使用中前三指姿势不稳定，容易变成 4 指或 5 指抓握。","跳跃中仍容易前后脚落地，需要继续练习双脚并齐。"],"next":["继续建立规则感：先说明任务顺序，再开始训练。","滑板车活动使用明确时间限制和姿势要求，强化抬头俯冲。","追球活动可继续保留，并逐步从喜欢的绿色球过渡到听不同颜色指令。","精细动作继续练习前三指使用镊子。","跳触觉圆盘继续练习双脚同时起跳、同时落地。"]},{"date":"2026-06-04","title":"06月04日","overview":"本节课墩墩整体配合度较好，但中间会出现故意做不好、试探老师规则的情况。老师通过提前说明目标、设置时间限制和明确奖励规则，帮助墩墩理解“没有完成挑战就不能获得奖励”。虽然第一个滑板推球项目因最后一次故意收手没有获得荡秋千奖励，但后续墩墩仍能继续配合完成其他任务。\n本节课也在逐步建立规则感：听指令追球时需要抓指定颜色、亲手把球放回小篮子；跳小棍后要回到指定“重生点”；平衡木要走在“干净的小路”上，不能从旁边走。","projects":[{"item":"俯冲滑板推球","result":"目标 5 组","performance":"目标是双手举起来推球。第 1 次墩墩有些偷懒，用单手推球，老师判定不算；后面 4 组能双手推球，说明已经知道正确做法。最后 1 次老师设置 10 秒时间和奖励规则，若没推好则不能玩荡秋千；墩墩在最后推球时故意把手收起来，没有推出去，因此没有获得荡秋千奖励。","focus":"继续坚持“双手推球才算完成”的标准；故意做不好时，按规则取消对应奖励。"},{"item":"听指令追球","result":"共 2 组，每组 10 个小球","performance":"过去墩墩常抓自己喜欢的绿色球。本节课老师提前说明难度升级，要听老师指定颜色。第 1 次老师要求抓粉色球，墩墩先去抓绿色球，老师提醒抓错颜色则挑战失败。墩墩随后追粉色球，但一开始把球扔回来，老师要求必须亲手拿回来并放进小篮子，墩墩能再去拿回。后续能按老师指令抓指定颜色。","focus":"继续练习听颜色指令，并要求亲手拿回、放入指定容器才算完成。"},{"item":"连续跳小棍","result":"共 2 组，每组 13 个小棍","performance":"以“躲避食人鱼”为情境，小棍是食人鱼，跳跃时不能碰到小棍。第 1 组墩墩跳得快，但每次跳完会说话，且往后退不及时；由于跳的时候往前跳，容易越来越靠近老师，回去慢时更容易碰到小棍。第 2 组老师提前设定“重生点”，要求每次跳完回到规定线，墩墩能按要求回到线上。整体没有被小棍碰到脚，但跳跃距离偏远，仍偏向往前跳，不是原地跳。","focus":"继续练习跳完及时回到指定位置，减少边跳边说话；逐步调整为更接近原地向上跳。"},{"item":"走平衡木 + 跳触觉圆盘","result":"共 4 组","performance":"结合“给饼饼加调料”的情境。本节课触觉圆盘跳跃进步明显：不需要老师辅助，能双脚并齐连续跳，且双脚同时落地；相比上节课轻辅助下会前后脚落地，姿势更好。走平衡木时有 1 组从旁边走过去，没有走在平衡木上。老师说明平衡木是“干净的小路”，旁边是泥泞小路，会弄脏调料；后面几组墩墩都能自己走到平衡木上完成。","focus":"保持双脚并齐跳触觉圆盘；平衡木环节继续强调必须走在指定路线。"}],"strengths":["整体配合度较好，后续任务能继续参与。","滑板推球中后面 4 组能双手推球，说明动作规则已理解。","听指令追球经过纠正后，能按指定颜色抓球，并按要求亲手拿回。","跳小棍反应快，2 组均没有被小棍碰到脚。","触觉圆盘跳跃进步明显，能双脚并齐连续跳并同时落地。","平衡木经情境规则提醒后，能回到指定路线完成。"],"issues":["会出现故意做不好、试探老师的行为，例如滑板推球时故意收手。","做任务时容易说话，影响跳小棍后及时返回。","跳小棍时跳得偏远，容易往前移动，需要练习原地或近距离向上跳。","听指令任务中仍会先选择自己喜欢的颜色，需要继续强化听指定颜色。","平衡木任务中仍可能尝试从旁边走，需要坚持路线规则。"],"next":["继续明确任务完成标准和奖励规则，故意未完成时按规则不发放奖励。","滑板推球坚持双手推球，不接受单手或故意收手。","听指令追球继续练习指定颜色，并要求亲手放入篮子。","跳小棍继续练习跳完回到“重生点”，减少说话，控制跳跃距离。","触觉圆盘保持双脚并齐跳；平衡木坚持走指定路线。"]},{"date":"2026-06-05","title":"06月05日","overview":"本节课整体任务完成较上一节有进步。比较明显的变化有两点：一是冲滑板时没有再故意把手缩回来、故意做不好；二是做完任务后能帮老师收教具，并出现了主动收教具的行为。老师在多个环节中通过提前讲清规则、坚定执行规则、及时具体表扬，帮助墩墩更好地完成任务。\n本节课新增奖励为“大陀螺”游戏，墩墩坐在大陀螺里转圈，比较喜欢该奖励。","projects":[{"item":"跳触觉圆盘 + 走平衡木","result":"共 6 组","performance":"触觉圆盘由以往直线摆放改为左右交替摆放，要求墩墩看清圆盘位置后再跳。任务前墩墩提出“饼饼熟了可以直接吃，不用加调料”，老师明确规则：即使熟了也要加调料才可以吃；调料对应加小珠子。规则讲清后，墩墩可以按老师要求完成。","focus":"继续在任务前明确规则，并要求按规则完成后再进入下一步。"},{"item":"冲滑板抓触觉球","result":"共 5 组","performance":"老师提前说明冲滑板需要完成 5 次，并设置时间限制。本节课要求墩墩冲滑板后用指定手快速抓起地上的小触觉球。5 组中墩墩都能自己抓起触觉球。到终点后，之前多由老师把滑板车抱回滑梯上，本节课墩墩可以自己把小滑板车抱起来并放到滑梯上，表现非常好。","focus":"保持按指定手抓球和独立搬滑板车，后续可继续提高速度与稳定性。"},{"item":"收教具","result":"多次配合，含 1 次主动收拾","performance":"本节课墩墩多次帮老师收教具。有时是老师提示后一起收，有一次在追圈活动结束后，老师还没有提示，墩墩自己把锥筒拿起来并放回原位。","focus":"继续及时表扬主动收拾行为，强化任务结束后的责任感。"},{"item":"追圈跑","result":"完成良好","performance":"老师推小圈，墩墩需要快速追上并抓回。之前追东西时容易扑到地上，本节课能冲出去、站着把圈抓回来，再快速跑回，没有趴到地上。老师及时具体表扬“站着把圈抓回来、快速跑回来”。后续墩墩在该活动中都能跑过去抓圈再跑回。","focus":"继续强化站着抓取、快速返回，不扑地。"},{"item":"套圈规则练习","result":"完成良好","performance":"之前墩墩会把圈立在障碍桶上。本节课老师提前说明要把圈套到上面，不能立在上面。刚开始墩墩仍想立上去，老师提示“要怎么放”，墩墩能改为套上去。完成后老师及时表扬，后续墩墩都能按要求完成。","focus":"任务前继续明确“怎么放”，并在做对时立即强化。"},{"item":"连续跳小棍","result":"完成规则训练","performance":"以“躲避食人鱼”的游戏情境进行。针对上节课跳得过于靠前的问题，本节课设定新规则：只能在黄色垫子区域跳，蓝色区域是“悬崖”。墩墩手里拿着“电池”，若跳到蓝色区域，电池需交给老师。开始时墩墩仍跳到蓝色区域，老师坚定执行规则并收走电池。之后老师提出连续 3 次都跳在黄色垫子上，就可以赢回电池。后续墩墩能按规则在黄色垫子上跳。","focus":"继续坚持规则不随意改变，达成目标后再返还奖励或物品。"}],"strengths":["冲滑板时没有故意缩手或故意做不好，配合度较上一节提高。","5 组冲滑板抓触觉球均能自己抓起，且能自己搬滑板车放回滑梯。","多次帮老师收教具，并出现主动收教具行为。","追圈时能站着抓圈并快速跑回，不再扑到地上。","套圈任务经提醒后能按要求“套上去”，而不是立在上面。","跳小棍在规则明确且坚定执行后，能逐步按黄色垫子范围完成。"],"issues":["一开始仍会尝试改变任务规则，例如认为“饼饼熟了不用加调料”。","追圈和套圈等任务仍需要提前讲清具体做法。","跳小棍时最初会跳到规则外区域，需要通过明确后果和目标强化来调整。","规则执行需要保持坚定，不能因墩墩请求而随意改变。"],"next":["继续强化任务前规则说明：做什么、做到什么标准、完成后才能获得什么。","冲滑板继续保持不缩手、独立搬车和按指定手抓球。","继续鼓励主动收教具，并及时说明表扬原因。","追圈保持站立抓取和快速返回。","跳小棍继续使用清晰边界，如黄色区域可跳、其他区域不可跳，并坚持达成目标后再给奖励。"]},{"date":"2026-06-11","title":"06月11日","overview":"本节课墩墩整体规则感较之前明显提升。刚进教室时，墩墩没有随便乱跑，也没有自行去拿东西或自己玩，而是在门口等待老师；老师进来时，墩墩正在门口等老师，并能跟老师拉手一起进入教室。老师说明第一个任务后，墩墩也能比较快地同意并进入任务。\n本节课仅出现 1 次未提前告知老师就自己去动的情况：墩墩想去玩“爬高山”游戏。老师提醒他要先完成当前任务，完成后需要告诉老师自己想玩什么，再去玩。之后墩墩能先快速收球，再向老师表达自己想玩的内容，并按照规则获得对应奖励。整体看，本节课规则遵守情况比之前更好。","projects":[{"item":"俯冲滑板推大龙球","result":"共 5 组","performance":"墩墩推球时非常用力，完成较好。每次搬滑板车时都能自己搬过去，过程中小手能抬起来，把大龙球推走。老师及时表扬他能自己搬滑板车，并用“大力士”等具体语言强化其独立完成行为。","focus":"继续保持独立搬滑板车和抬手推球，后续可逐步增加难度。"},{"item":"指令追圈 + 追球","result":"追圈后加玩 5 个小球","performance":"原定进行指令追圈：老师推两个圈，并提前指定颜色锥筒，如蓝色或红色，让墩墩快速转圈后把圈套到指定锥筒上。墩墩能比较快地抓到圈并完成指定套圈任务。完成后墩墩表达还想追球，老师增加追 5 个小球作为延伸活动。","focus":"继续练习听颜色指令、快速反应和按规则表达想玩的内容。"},{"item":"连续跳小棍","result":"共 2 组，合计 12 个小棍","performance":"墩墩能按要求在黄色垫子范围内跳，没有跳出黄色格子。相比之前会试探跳到旁边区域，本节课老师提前讲清楚规则后，墩墩能按要求完成，反应速度也较好。不足是返回时仍是转身回去，没有按老师指定动作倒着回去。","focus":"继续保持不跳出范围；下节重点练习跳完后倒着返回，方便持续观察小棍位置。"},{"item":"夹毛球 + 跳障碍","result":"完成良好","performance":"墩墩本节课跳触觉圆盘表现较好。之前会挑选触觉圆盘，遇到凸起较高或较尖、感觉不舒服的圆盘时会拿走并表示不要；本节课面对黄色凸起圆盘也能直接跳过去。老师及时指出这一点并表扬，墩墩也能回应自己做得好。","focus":"继续强化不挑选圆盘、按路线完成任务的规则意识。"}],"strengths":["进教室时能等待老师，没有乱跑或自行拿东西玩。","能在老师说明任务后较快进入任务，整体配合度较好。","想玩其他游戏时，经提醒后能先完成当前任务，再向老师表达需求。","俯冲滑板推大龙球完成较好，能自己搬滑板车。","跳小棍能遵守黄色垫子范围，规则感较之前明显提升。","跳触觉圆盘时不再明显挑选圆盘，能跳过以前可能抗拒的黄色凸起圆盘。"],"issues":["偶尔仍会未提前告知老师就想自行去玩其他项目。","跳小棍返回时仍习惯转身回去，尚未按要求倒着返回。","需要继续在任务前明确规则，并在好行为出现时立即、具体地表扬。"],"next":["继续强化进教室等待老师、跟老师一起行动的规则。","想玩其他项目时，继续练习先表达、再获得允许。","跳小棍保持在黄色范围内跳，并重点练习倒着返回。","继续通过具体表扬强化好行为，例如说明“为什么表扬”，让墩墩知道自己做对了什么。","下节课可在当前规则配合较好的基础上增加新的训练内容。"]},{"date":"2026-06-12","title":"06月12日","overview":"本节课新增一条课堂规则：每次完成任务后，都要回到固定位置坐好。老师给墩墩准备了一把小椅子，并用“回家坐好”的方式帮助他理解规则。墩墩当天整体执行较好，但容易忘记，需要老师侧面提示，例如提醒“任务做完之后我们要干嘛来着”，并指向小椅子；看到椅子后，墩墩可以自己主动过去坐好。\n整体来看，墩墩本节课任务完成情况不错，但说话较多。老师通过设置 10 秒时间限制，减少他在任务间隙说很多话的情况，帮助他更快回到任务流程中。","projects":[{"item":"俯冲滑板推球","result":"共 5 组","performance":"本节课将之前的大龙球换成篮球大小的小球，要求墩墩快速推球。墩墩能比较快速地把球推过去，但滑板车方向控制仍不稳定，5 组中有 3 组把球推歪，2 组能较笔直地把球推走。","focus":"继续练习滑板方向控制，提高直线推球稳定性。"},{"item":"脚踏车骑行","result":"共 3 组，一来一回为 1 组","performance":"本节课新增脚踏车活动，用“往冰箱运冰块”的情境引导骑行。共骑行 6 次，其中 5 次正骑、1 次倒骑，均为双手扶把。正骑完成较好，可连续骑约 8 米，但速度不能太快，否则容易控制不好小车并向前摔倒。倒骑不太流畅，容易卡住或摔倒，最多可连续倒骑约 5 米，墩墩对倒骑主动性不高。","focus":"正骑时控制速度，倒骑先保证稳定和安全，逐步提高流畅度和主动性。"},{"item":"跳触觉圆盘 + 夹子夹物品","result":"共 6 组","performance":"夹物品完成较好。触觉圆盘距离比之前更远，墩墩能主动跳远，约可跳 60-70 厘米，表现较好。随后走平衡木速度较快。","focus":"保持跳远能力，同时注意平衡木环节的节奏和稳定。"},{"item":"限时取调料","result":"结合夹物和平衡木任务进行","performance":"因墩墩每次放好小球后会说很多话，老师加入 10 秒倒计时规则：如果 10 秒内没有取到调料，调料就“过期”，任务不能继续。加入倒计时后，墩墩能更快返回取调料，减少多余讲话。","focus":"可继续使用明确倒计时，帮助墩墩提升任务连续性，减少任务中断。"},{"item":"连续跳小棍","result":"完成良好","performance":"本节课重点练习跳完小棍后倒着走回去，方便随时看见小棍位置。墩墩能按要求倒着回去，完成不错。跳跃时也能控制距离，没有跳出老师规定范围。","focus":"继续保持倒着返回和规定范围内跳跃的规则。"}],"strengths":["新增“完成任务后回家坐好”规则后，墩墩在提示下可以主动回到椅子坐好。","正骑脚踏车可连续约 8 米，基础骑行能力较好。","跳触觉圆盘距离提升，可跳约 60-70 厘米。","连续跳小棍时能控制距离，不跳出规定范围，并能练习倒着返回。","10 秒倒计时对减少任务间隙讲话、提高任务连续性有效。"],"issues":["完成任务后主动回固定位置的规则刚建立，仍容易忘记，需要老师提示。","俯冲滑板推小球时方向控制不够稳定，5 组中有 3 组推歪。","正骑脚踏车速度过快时容易失控，需要提醒放慢速度。","倒骑脚踏车不够流畅，容易卡住或摔倒，主动性较弱。","任务过程中说话较多，需要继续用清晰规则和时间限制进行引导。"],"next":["继续强化“任务结束后回家坐好”，逐步减少老师提示。","俯冲滑板继续练习直线推球和方向控制。","脚踏车正骑以稳定、慢速为主，倒骑先从短距离稳定完成开始。","跳触觉圆盘和平衡木任务中继续保持距离和稳定性。","继续使用 10 秒倒计时等明确规则，减少任务中说话和拖延。"]},{"date":"2026-06-13","title":"06月13日","overview":"本节课继续沿用上节课新增的小规则：完成任务后回到椅子或指定位置坐好。墩墩本节课共有 3 次执行该规则，前 2 次需要老师提示，最后 1 次在任务结束后可以主动回到指定位置坐好。老师及时请另一位老师一起观察并表扬墩墩，墩墩被表扬后坐姿更端正，腰背挺得更直。\n整体来看，墩墩本节课任务配合度较好，但任务中说话较多。老师通过设置时间限制、提醒快速完成任务，来减少他在任务过程中说话的行为。规则方面，墩墩偶尔会试探边界，例如想提前拿下一环节的小玩具；在老师坚定说明规则后，墩墩能把玩具放回去并继续配合。","projects":[{"item":"俯冲滑板推足球","result":"共 5 组","performance":"本节课使用更小的足球进行推球训练，墩墩整体推得较好。老师尝试让他在滑板车上提前把手抬起，但该姿势较累，本节课尚未成功；多数情况下是在快靠近球时才自己把手抬起来。","focus":"下节课继续尝试提前抬手，逐步提升俯冲姿势下的上肢控制。"},{"item":"脚踏车骑行","result":"正骑、倒骑均有练习","performance":"本节课增加单手骑行难度，通过“运送冰块”的情境，引导墩墩正骑时抬起一只手、单手扶把。墩墩能慢慢骑，单手骑行完成较好。正骑约可达到 5 米；倒骑时双手扶把，只要不突然回头、能专心低头或看前方，可连续骑约 7 米。若突然回头，车身受力变化后容易卡住，需要老师辅助。","focus":"继续练习单手正骑和专注倒骑，减少骑行中突然回头导致卡顿。"},{"item":"连续跳小棍","result":"完成良好","performance":"墩墩跳跃姿势和身体控制较之前更好。能在规定范围内跳，即使距离边缘约 30 厘米，也可以控制身体不跳出边缘。相比之前容易向前跳很远，本节课能有意识地跳近一点、更多向上跳。返回时也能倒着走回去，没有绕弯或转身。","focus":"保持规定范围内跳跃，继续强化向上跳和近距离控制。"},{"item":"勺子运物 + 平衡木 + 触觉圆盘","result":"共运送 5 个调味品","performance":"本节课在平衡木和触觉圆盘活动中加入视觉注视任务，将之前的小夹子换成小勺子，要求墩墩端着勺子运送“调味品”。刚开始墩墩会用手扶勺子，需要老师提示把手放下。共运送 5 个，其中 3 个掉落，尤其在走到最后向下迈步时，稳定性控制不足，勺子上的小物品容易掉。过程中墩墩多数时间能看着手里的勺子，有时会看平衡木，需要提示眼睛更多关注勺子。","focus":"加强端勺稳定性和视觉注视，重点练习最后下台阶或迈步时保持平稳。"}],"strengths":["完成任务后回指定位置坐好的规则开始建立，最后 1 次已能主动完成。","被表扬后坐姿更端正，正向强化效果明显。","脚踏车单手正骑完成较好，倒骑专注时可连续约 7 米。","跳小棍时身体控制进步明显，能控制跳跃距离并遵守范围规则。","在老师明确规则后，能把提前拿走的小玩具放回去，说明规则可被执行。"],"issues":["任务中说话较多，需要继续通过时间限制和任务要求减少边做边说。","俯冲滑板中提前抬手较困难，常到接近球时才抬手。","倒骑时容易因突然回头导致车身卡顿。","勺子运物稳定性不足，尤其最后迈步时容易掉落。","规则边界仍会被试探，需要老师提前、坚定、清楚地说明。"],"next":["继续强化“完成任务后回指定位置坐好”，从提示完成逐步过渡到主动完成。","任务前明确规则，任务中用时间限制减少说话行为。","俯冲滑板继续练习提前抬手，为后续更高难度推球或投球做准备。","脚踏车继续练习单手正骑、专注倒骑，减少突然回头。","勺子运物重点练习眼睛看勺子，以及最后迈步时的稳定控制。","对表现好的行为及时表扬和强化；若触犯规则，则明确对应游戏或奖励不能继续。"]},{"date":"2026-06-15","title":"06月15日","overview":"本节课主要完成了趴滑板推球、脚踏车骑行、连续跳小棍和新增拍球训练。整体来看，墩墩在趴滑板推球、倒骑脚踏车、跳小棍等项目上有明显进步，规则配合也较好：完成任务后不需要老师提示，就能自己回到指定位置坐好，并且能帮助老师收拾训练物品。\n课前及任务前，老师继续强调课堂规则，包括进教室后不能随便乱跑、完成任务后回指定位置坐好等。老师也提醒，墩墩做得好时需要及时给予强化和表扬，本节课采用了点赞和兑换小礼品的方式进行鼓励。","projects":[{"item":"趴滑板推球","result":"完成良好","performance":"本节课继续练习趴在滑板上双手抬起推球。上节课墩墩尝试该姿势时双手较难抬起；本节课已有 1 组可以双手抬起并完成推球，推球准确度较好。","focus":"下节课可增加难度，尝试抱球投球类训练。"},{"item":"脚踏车骑行","result":"正骑、倒骑均有练习","performance":"倒骑时双手扶把手，整体完成较好，8-9 米距离中通常只有 1 次卡顿，需要老师辅助。卡顿后墩墩会马上想下车，老师提示不能下来，并引导他可先向前骑一小段再重新倒骑。正骑时单手扶把手，最长可骑约 4 米，另有一次约 3 米；本节课老师没有扶车，完成度较好。","focus":"继续练习卡顿后的处理方式，减少一卡顿就想下车的反应。"},{"item":"连续跳小棍","result":"共 2 组，合计 13 个小棍","performance":"老师推动小棍的速度比之前更快，墩墩反应速度较好，能快速起跳；同时能遵守规则，保持在黄垫子范围内，没有跳到垫子外。任务结束后还主动帮老师搬小冰块、收拾物品。","focus":"保持规则意识和反应速度，可继续逐步提高速度或数量。"},{"item":"拍球训练","result":"新增项目，最多连续拍 4 个","performance":"刚开始墩墩表示不想拍篮球，老师降低难度，从拍一下抱住开始，逐步增加到连续拍 2 个、3 个、4 个。目前拍球力道合适，力量较足；不足是拍球时眼睛看球不够，经常看老师。","focus":"下节课继续强调眼睛看球，提高视觉追踪和连续拍球稳定性。"}],"strengths":["趴滑板推球中双手抬起能力有进步，已有 1 组完成较好。","倒骑脚踏车完成度较好，正骑单手扶把手也比上节课更稳定。","跳小棍反应快，能遵守不跳出黄垫子的规则。","完成任务后能自己回指定位置坐好，不需要老师提示。","能配合老师收拾训练物品，课堂责任感和配合度较好。"],"issues":["脚踏车卡顿后容易立刻想下车，需要继续练习坚持和重新启动。","拍球时眼睛看球不足，注意力容易转向老师。","课堂规则仍需每节课持续提前强调，并在表现好时及时强化。"],"next":["趴滑板项目可从推球升级为抱球投球训练。","脚踏车继续练习卡顿后的处理：先调整、再重新启动，减少直接下车。","拍球训练重点提醒眼睛看球，逐步提升连续拍球数量和稳定性。","继续保持任务后回指定位置坐好的好习惯。","表现好时及时给予点赞、表扬或小礼品强化。"]},{"date":"2026-06-17","title":"06月17日","overview":"本节课重新完整讲解了课堂两项核心规则：\n1. 做任务时不能随意讲话，发言前需要举手。\n2. 完成任务后回到指定位置坐好等待。\n墩墩在“完成任务后坐好等待”方面执行稳定，每次任务结束后能自觉静坐等候；但在任务过程中仍存在随意讲话、不听指令、分心跑开等情况。本节课因多次不遵守指令，全程未发放小奖励。","projects":[{"item":"俯冲滑板抱球投篮","result":"共 5 组","performance":"由以往推球升级为抱球抬臂投篮。老师慢速辅助、口头提示下可以投进；自主操作时能稳稳抱球，但投篮时机把控不足，常在距离篮筐尚远时提前抛球，导致难以投中。","focus":"下次加入统一投篮指令，训练听信号后再投球。"},{"item":"脚踏车骑行","result":"仅完成 2 组，提前终止","performance":"向前骑行可连续约 5 米，途中轻微卡顿；倒骑手扶车把约 4 米，中途卡顿 1 次，辅助后完成度更好。训练中频繁跳下车，不听老师指令；老师示范屈膝骑行技巧时，直接拿球跑开。","focus":"强化听从指令和持续完成任务的规则意识。"},{"item":"勺子运物 + 平衡木 + 跳障碍","result":"共 4 组","performance":"其中 2 组能完整稳住勺子，将物品平稳运送至终点。过程中有一次分心不听指令，跳到触觉圆盘后停下，想去玩书包桶。","focus":"继续强化专注完成当前任务，再进入奖励环节。"},{"item":"连续跳小棍","result":"完成良好","performance":"能紧盯滚动小棍，跳跃速度快，全程稳定在格子范围内，动作规范。","focus":"保持当前节奏与动作质量。"},{"item":"小青蛙四点支撑跳","result":"剩余时间加练","performance":"四肢四点撑地，小棍滚来时依次抬手、抬脚跨越。大多需要老师上手辅助，辅助后整体动作完成度良好。","focus":"逐步减少辅助，提升独立完成度。"}],"strengths":["完成任务后静坐等候的规则执行到位。","连续跳小棍表现优秀，动作速度、稳定性和规范性较好。","勺子运物项目中有 2 组完成质量较高，肢体基础能力尚可。"],"issues":["多项训练中频繁不听指令，容易分心、乱跑。","脚踏车和平衡木相关任务因规则执行问题受到影响，脚踏车项目提前结束。","小青蛙四点支撑跳仍依赖老师辅助。","投篮时机把控不足，需要听统一指令后再出手。"],"next":["继续强化课堂规则：任务中少讲话，发言先举手；听完老师指令再行动。","重点训练“听信号再投球”，改善投篮时机。","提高脚踏车项目中的持续配合度，减少中途跳车、跑开的情况。","小青蛙四点支撑跳逐步减少老师辅助，提升独立完成能力。","奖励规则继续明确：全程遵守课堂规则、听从老师指令后，正常获得奖励。"]},{"date":"2026-06-18","title":"06月18日","overview":"本节课继续以规则遵守为基础，引导墩墩在任务过程中主动遵守规则。整体任务完成较好，尤其是“完成任务后主动回指定位置坐好”表现非常稳定：老师本节课一次都没有提示，墩墩每次完成任务、放好教具后，都能快速回去坐好。\n本节新增“小飞机”训练，重点练习核心力量、上肢控制和身体控制。整体来看，墩墩在规则执行上较 6 月 17 日有明显恢复；但在最后一组勺子运物中，因坚持把积木放到非指定位置，未获得当天奖励。","projects":[{"item":"小飞机核心力量训练","result":"最高坚持约 15 秒","performance":"新增训练项目。墩墩趴在滑板车上，要求手臂向前伸，头、手臂、肩膀向上抬起，同时双腿伸直抬起。该活动较累，老师采用逐步加时方式：第 1 组 5 秒，第 2 组 10 秒，第 3 组 15 秒。墩墩最多可坚持约 15 秒。过程中头部抬高需要提示，老师把手放在头顶位置，引导墩墩用头去碰老师的手；头抬高较好，但坚持时间不长。双脚会来回点地或屈膝，不能一直伸直；手偶尔会用手指碰地或碰老师，且不太能向前伸直，多为侧平举。","focus":"继续练习核心力量、头部抬高、手臂前伸和双腿伸直，时间逐步增加，不宜一次要求过高。"},{"item":"俯冲滑板抱球投篮","result":"共 5 组","performance":"针对上节课投球过急的问题，前 3 组由老师辅助控制滑板速度，墩墩抱球后需听老师指令“投球”再投。后 2 组让墩墩自主完成。第 4 组抱球后能等待，但等待时间较短，投球仍略早；最后 1 组完成较好，能抱球后等待，并根据老师指令再投球，挑战成功。","focus":"继续强化“抱球后等待，听到指令再投”，逐步减少老师对速度的辅助。"},{"item":"单脚站","result":"左右脚各 1 次达到 10 秒","performance":"要求抬起一只脚并保持不摇晃。刚开始多为 2-3 秒，持续时间较短；老师提出站到 5 秒以上，并边数数边引导后，站立时间有所延长。最好表现为左右脚各连续站 10 秒，但仅出现 1 次。","focus":"继续练习单脚站稳定性，目标从 5 秒逐步稳定到 10 秒。"},{"item":"单脚跳","result":"左脚最好连续 7 个，右脚最好连续 2 个","performance":"左脚单脚跳表现更好，最多可连续跳 7 个；右脚跳时身体摇晃较多，不够稳定，最好一次连续跳 2 个。","focus":"右脚单脚跳需重点加强，先练稳定，再增加连续数量。"},{"item":"勺子运物身体控制","result":"共 4 组，3 组成功","performance":"用勺子挖小积木块并端着向前走。本节共 4 组，其中 3 组没有掉落，走得很稳；仅 1 组在终点时球掉下去。过程中没有说话，任务配合较好。最后 1 组放积木时，墩墩不愿放到原定“饼饼”上，坚持要放到旁边小盘子上。老师明确需放到饼饼上才有奖励，并给 5 秒调整时间，墩墩没有调整，因此当天奖励未获得。","focus":"保持端勺稳定和任务中安静；继续强化“按指定位置放置”这一规则，避免最后一步因规则不符影响奖励。"}],"strengths":["完成任务后主动回指定位置坐好表现非常好，本节课无需老师提示。","6 月 17 日规则波动后，本节整体任务完成明显恢复。","抱球投篮能从“过早投”进步到最后 1 组听指令后再投，说明等待和听信号能力可训练。","勺子运物 4 组中 3 组成功，稳定性较前几节更好，且过程中没有说话。","单脚站在提示和数数辅助下，左右脚均出现过 10 秒表现。","左脚单脚跳可连续 7 个，具备一定单脚跳能力基础。"],"issues":["小飞机训练中核心力量和持续保持姿势能力不足，最多约 15 秒，且腿部容易点地或屈膝。","手臂前伸控制不足，容易变成侧平举，或用手指触地、碰老师。","投篮等待时间仍偏短，需要继续练习听信号后再投。","右脚单脚跳明显弱于左脚，身体摇晃较多。","最后一组因不愿按指定位置放积木导致未获得奖励，说明规则边界仍需持续强化。"],"next":["小飞机训练继续以短时间、多次数方式进行，逐步增加保持时间，并重点提示腿伸直、手前伸。","投篮继续练习“抱球等待-听指令-再投球”，把最后 1 组的成功经验稳定下来。","单脚站目标先稳定 5 秒，再逐步提高到左右脚各 10 秒。","单脚跳重点加强右脚稳定性，先控制身体摇晃，再增加连续跳数量。","勺子运物继续记录成功组数和掉落位置，同时强化最后一步必须按指定位置放置。","继续保持完成任务后主动回座位的好习惯，并及时具体表扬。"]},{"date":"2026-06-22","title":"06月22日","overview":"本节课先进行规则说明，再进入任务。第一个冲滑板抱球投球项目原计划完成 5 组，但墩墩只完成 2 组，返回过程中出现故意坐着不推、一直等待的情况，老师据此结束该游戏，并说明如果不好好完成任务，游戏和后续奖励都会取消。\n随后老师引入“小贴纸兑换”规则：先让墩墩选择一个喜欢的小礼物，再说明每个任务中按照老师要求完成可获得贴纸，快速做好并遵守规则还可额外获得贴纸，集齐 10 颗小贴纸即可兑换所选礼物。引入该规则后，墩墩后续任务的规则遵守情况比前面更好，获得的小贴纸也更多。","projects":[{"item":"冲滑板抱球投球","result":"原计划 5 组，仅完成 2 组","performance":"本节第一个活动。任务本身完成质量尚可，但规则遵守不理想。墩墩在返回过程中有些故意坐着不推、一直等待，因此老师提前结束该游戏，并取消对应游戏和奖励。","focus":"任务开始前继续明确完成组数和奖励条件；若中途故意停下，继续稳定执行提前结束规则。"},{"item":"小贴纸兑换规则","result":"新增行为强化机制","performance":"墩墩先挑选喜欢的小礼物，随后通过完成任务获得小贴纸，集齐 10 颗可兑换礼物。每个任务前，老师都会提前说明本任务最多能获得几颗贴纸，以及获得条件。引入后，墩墩后续规则遵守比第一个活动更好。","focus":"可继续使用贴纸兑换系统，重点观察是否能帮助墩墩持续完成任务、减少规则试探。"},{"item":"勺子运物 + 走平衡木","result":"共 4 组，3 组未掉落","performance":"规则为球放在勺子上走平衡木，4 组中 3 组不掉可奖励 1 颗贴纸，4 组都不掉可奖励 2 颗贴纸。墩墩本节 3 次没有掉下去，完成较好。走平衡木时眼睛能盯着小球，走得稳，没有着急。跳的过程中也遵守规则：若脚碰到地上，需要回到起始小石块重新跳。","focus":"保持眼睛看球、慢走、稳定通过；继续用成功组数和贴纸条件强化稳定完成。"},{"item":"平衡脚踏车运小冰块","result":"正骑 2 组、倒骑 2 组，均达标","performance":"本节目标为正骑单手扶把超过 5 米，倒骑双手扶把超过 7 米。墩墩正骑 2 组均为 7 米，倒骑 2 组也均为 7 米，全部达到老师目标，完成非常好。本组奖励 5 颗小贴纸。","focus":"继续巩固单手正骑和双手倒骑，可逐步增加稳定性要求或减少卡顿。"},{"item":"小飞机 + 趴推大球","result":"小飞机最长 40 秒；推球最好连续 24 个","performance":"小飞机姿势下趴在滑板车上，加入趴推滚过来的大球。推球最好成绩为连续 24 个，第二组连续 10 个。小飞机最长坚持 40 秒，比上节课时间明显增加，但 40 秒内不能一直保持标准姿势：脚会点地，时间长后腿会屈膝；手臂和肩膀容易往下放，头也需要及时提示抬高。本节降低难度，让手向后伸，抬起来更轻松。","focus":"继续提高坚持时间，同时重点修正姿势质量：头抬高、肩膀抬起、腿伸直、减少脚点地和屈膝。"}],"strengths":["小贴纸兑换规则对墩墩有积极效果，引入后规则遵守比第一个活动更好。","勺子运物 4 组中 3 组不掉，能盯着小球、稳定走平衡木。","平衡脚踏车表现非常好，正骑 2 组均 7 米，倒骑 2 组均 7 米，全部达标。","小飞机最长坚持时间从上节约 15 秒提升到本节 40 秒，耐力有明显进步。","趴推大球最好可连续推 24 个，说明在感兴趣或目标明确的情况下可持续完成较多次数。"],"issues":["第一个冲滑板抱球投球活动中规则遵守不佳，原计划 5 组仅完成 2 组。","仍会出现故意坐着不继续任务、等待老师处理的情况。","小飞机坚持时间增加，但姿势标准性不足，脚点地、屈膝、肩膀和手臂下落仍明显。","需要继续观察贴纸规则是否能持续有效，避免只在刚引入时有效。"],"next":["继续使用小贴纸兑换系统，并记录每个任务获得几颗贴纸、因什么行为获得或失去贴纸。","冲滑板抱球投球继续明确目标组数，减少中途故意停下或不推。","勺子运物继续保持 4 组中至少 3 组稳定不掉，逐步争取 4 组全成功。","脚踏车可在达标距离基础上增加“全程不中断、不跳车、听停走指令”等规则要求。","小飞机训练在延长坚持时间的同时，更重视姿势质量，避免只追求秒数。"]},{"date":"2026-06-24","title":"06月24日","overview":"本节课刚进教室时，墩墩在脱鞋、搬椅子等入室准备上有些不配合。老师先帮他脱鞋，并让他坐到椅子上重新讲课堂规则和课后奖励，明确希望墩墩做到什么样子，并询问他是否可以做到。调整后，老师让墩墩把椅子搬到之前“家”的位置，墩墩可以自己搬好。\n整体来看，本节课偶尔仍会出现不配合，需要老师调整；但在明确规则、贴纸奖励和及时反馈后，多个项目仍能完成较好。新变化是脚踏车难度继续升级，正骑改为双手不扶把，倒骑改为单手扶把。","projects":[{"item":"入室准备与规则调整","result":"经调整后可完成","performance":"进教室后脱鞋、搬椅子不太配合。老师先协助完成脱鞋，再坐下讲规则和奖励。调整后，墩墩可以按要求自己把椅子搬到“家”的位置。","focus":"入室流程可作为固定任务练习：脱鞋、搬椅子、坐好听规则，减少进入课堂时的切换阻力。"},{"item":"蹦床 / 大篮球跳跃计数","result":"共 10 组，6 组跳对","performance":"该活动用于身体控制和前庭觉输入。规则为老师说跳几下，墩墩需要跳对应次数后停住。15 个以内的数量记得较牢，能听到数字后完成并立刻停下；18-20 个以上时容易忘记数量，例如老师说跳 25 下，他可能跳到 30 下。本节共 10 组，其中 6 组跳对。","focus":"继续练习“听数字-执行-停住”的抑制控制。数量先稳定在 15 个以内，再逐步增加到 20 个以上。"},{"item":"趴滑板推球 / 小飞机推球","result":"第 1 组完成 40 个；第 2 组完成 30 个","performance":"该活动由墩墩主动选择，积极性较好。老师原目标为 40 个，墩墩自己提出 50 个。开始后因姿势标准要求较高，做到第 15-16 个左右出现肘撑地。老师指出此前墩墩有能力连续推 30 个不撑地，因此前 30 个手必须抬起来，若未做到会扣 1 颗贴纸。墩墩再次撑地后，老师直接拿走贴纸。之后墩墩有努力推，但手仍会有点撑地，老师稍微辅助后完成连续 40 个，并立刻给予奖励和具体表扬。第 2 组墩墩选择挑战 30 个，完成很好，连续 30 个没有出现肘撑地。","focus":"继续区分“数量目标”和“姿势质量”。可先稳定连续 30 个不撑地，再挑战 40 个，同时减少辅助。"},{"item":"脚踏车升级训练","result":"正骑不扶把约 3.8 米；倒骑单手约 1 米","performance":"上节课正骑单手扶把、倒骑双手扶把完成很好，本节提高难度：正骑要求双手不扶把，倒骑要求单手扶把。正骑不扶把可连续约 3.8 米，不到 4 米；倒骑单手扶把约 1 米。骑行中有些着急，脚还没准备好就蹬出去，需要提示放慢。慢一点骑时更稳。运送冰块时整体较配合；对不扶把或少扶把有些不愿意，但老师让他把小手背后后，也能配合完成。","focus":"新难度下先追求慢和稳，不急于距离。正骑不扶把目标先稳定到 4 米，倒骑单手先从 1 米逐步增加。"}],"strengths":["入室准备一开始不配合，但经过规则和奖励说明后，能自己搬椅子到指定位置。","蹦床跳跃 10 组中 6 组能按指定数量完成，15 个以内的数字控制较好。","主动选择较累的推球活动，说明对部分训练有主动参与意愿。","趴滑板推球第 2 组连续 30 个没有肘撑地，姿势控制较好。","推球第 1 组在贴纸被扣后仍能努力完成 40 个，说明明确后果对行为调整有效。","脚踏车在提高难度后仍能配合尝试，正骑不扶把可接近 4 米。"],"issues":["入室切换和准备流程仍有困难，脱鞋、搬椅子等基础常规需要继续练。","跳跃计数超过 18-20 个后容易忘记目标数量，抑制控制和工作记忆仍需练习。","趴滑板推球在累或要求较高时容易肘撑地，需要继续强化姿势质量。","有时会对更高难度动作不太愿意配合，需要通过清晰规则和即时反馈调整。","脚踏车新难度下容易着急，动作准备不足，需练慢速、稳定启动。"],"next":["把入室流程固定化：脱鞋、搬椅子、坐好、听规则，作为课堂第一项小任务。","蹦床跳跃继续练“听数字后跳够并停住”，先稳定 15 个以内，再逐步增加数量。","趴滑板推球继续把姿势质量作为核心目标，先稳定连续 30 个不撑地，再挑战 40 个。","脚踏车升级训练先以慢速稳定为主，正骑不扶把稳定 4 米，倒骑单手从 1 米逐步增加。","继续使用贴纸系统，但要记录扣贴纸和得贴纸的具体原因，帮助墩墩理解行为结果。"]},{"date":"2026-06-25","title":"06月25日","overview":"本节课整体任务完成较好。老师观察到，墩墩比较适合通过“小情境/小游戏”的方式进入任务，例如把单脚站和单脚跳设计成“小快递员送快递”“快递出库”“传送带”等情境后，配合度较好。\n本节新增加单脚站、单脚跳任务，并继续练习抱球投篮、听指令跳大龙球和脚踏车。整体看，墩墩在小情境支持下表现更稳定；但在数字较大的跳跃计数、单脚跳落点控制和脚踏车双手离把方面仍需要继续练习。","projects":[{"item":"单脚站","result":"左右脚均可连续 10 秒","performance":"新增“小快递员”等待快递出库情境。墩墩拿到快递后，需要单脚抬起站立并坚持 10 秒。老师倒数 10 个数，墩墩左右脚都可以从 10 坚持到 0，完成非常好。","focus":"继续稳定左右脚各 10 秒，可逐步减少倒数提示或增加身体稳定要求。"},{"item":"单脚跳送快递","result":"最好连续约 7 次","performance":"设置“传送带”情境，要求单脚从圈圈中跳过去把快递送到终点。墩墩能连续跳约 7 次，但需要额外提示脚要踩到圈里，不能踩圈边。表现最好的一次中，连续跳 7 个，其中 5 个没有踩圈，2 个踩圈边。提示“快递很重要，不能踩到传送带避免摔倒”后，墩墩能有意识地控制落点。","focus":"继续练习单脚跳落点控制，目标从“能连续跳”升级为“连续跳且踩进圈内”。"},{"item":"冲滑板抱球投篮","result":"共 5 组，4 组投中","performance":"前 2 组由老师辅助控制滑板车速度，后 3 组让墩墩自己推出去、抱球、投球。整体完成非常好，5 组中 4 组投中，1 组砸到篮筐边未进。","focus":"继续巩固自主抱球投篮，逐步减少速度辅助，并保持听信号、看目标后再投。"},{"item":"听指令跳大龙球 / 跳球计数","result":"共 5 组","performance":"本节跳跃数量较多，基本在 15-25 个之间。18 个以内时，墩墩较能记住数字；超过 18 个后容易记不牢，边跳边忘。两组 20 个以上分别为 20 个和 24 个，墩墩会跳多。一组目标 18 个，墩墩跳到 20 个后突然想起好像跳多了，能说出原目标是 18 个。","focus":"继续练习较大数字的听觉记忆和边跳边计数，先稳定 18 个，再逐步增加到 20-25 个。"},{"item":"脚踏车红绿灯情境","result":"最好连续约 3 米","performance":"原计划用“开车遇红灯停、绿灯前进”情境，让墩墩手拿方向盘骑行。但两手同时抬起对墩墩较难，他不太喜欢。后续改为让墩墩拿红色、绿色沙包作为红绿灯向前骑行。最好成绩为连续骑行约 3 米；过程中速度比之前更慢，没有明显一冲一冲的着急情况。3 米内有一次轻微卡顿，老师询问是否需要帮忙，并稍微往前辅助后继续启动。","focus":"继续用红绿灯情境练脚踏车，重点保持慢速、稳定、卡顿后继续启动。双手离把难度较高，可逐步过渡。"}],"strengths":["小情境方式对墩墩很有效，能提高任务参与度和配合度。","单脚站左右脚均可连续 10 秒，表现稳定。","单脚跳可连续约 7 次，具备连续跳基础。","冲滑板抱球投篮 5 组中 4 组投中，自主完成度较好。","跳球计数中，即使跳多了，也能回忆起老师原本要求是 18 个，说明有一定自我监控。","脚踏车速度较之前放慢，急躁情况减少，轻微卡顿后能在辅助下继续。"],"issues":["单脚跳落点控制不足，容易踩到圈边，需要继续练“跳进圈内”。","跳跃计数超过 18 个后容易忘记目标数字，工作记忆和抑制控制仍需练习。","脚踏车双手同时抬起难度较高，不太愿意配合。","脚踏车仍有轻微卡顿，需要继续练卡顿后重新启动。"],"next":["继续采用小情境方式设计任务，尤其是新任务和较难任务。","单脚站继续稳定左右脚 10 秒，逐步减少提示。","单脚跳重点从“连续跳”转向“连续跳且踩进圈内”。","听指令跳球继续练 18 个以上的数字记忆，可分 18、20、24 逐步提高。","脚踏车红绿灯情境继续保留，先保持慢速稳定，再逐步增加双手离把或单手控制难度。"]},{"date":"2026-06-26","title":"06月26日","overview":"本节课墩墩进教室状态较好，进入教室后可以较快搬小椅子。第一个任务由老师给出选择：滑滑板或跳大龙球，墩墩自己选择了跳大龙球，说明在“可选择”的设置下，主动参与度较好。\n本节课整体仍以小情境带入任务，任务完成情况尚可，但出现了几次“故意数错”“故意做不好”的情况。老师的处理重点不是单纯停止任务，而是引导墩墩说出解决方法，例如累了可以说“老师帮我一下可以吗”，而不是直接把脚放下或用行为中断任务。这一点对后续行为规则和表达训练都很有价值。","projects":[{"item":"入室与任务选择","result":"入室较顺利，主动选择跳大龙球","performance":"进教室状态比较好，搬小椅子较快。老师让墩墩在滑滑板和跳大龙球中选择第一个活动，墩墩选择了跳大龙球。","focus":"继续保留“有限选择”，让墩墩在规则范围内有选择权，帮助任务启动。"},{"item":"跳大龙球 / 计数","result":"共 5 组，3 组正确","performance":"本节继续练“听数字-边跳边数-跳够停住”。老师会多次确认目标数字，例如反复问“这一组跳到几”，帮助加深记忆。5 组中 3 组正确；1 组出现故意数错，例如目标 16 下，中间数到 10 后跳到 6、9、10、16，老师判定不能算，需要重新数对后才奖励；另 1 组目标 18 下，墩墩跳到 20 下。","focus":"继续练习 16-20 个范围的计数和停住。若出现跳数正确但中间数错，应坚持“不算，重新来”的规则。"},{"item":"单脚站","result":"可站 10 秒以上","performance":"刚开始墩墩会说“这只脚累了，要换另一只脚”，站几秒就想换脚，有些故意做不好的表现。老师引导他如果觉得累，可以说“老师帮我一下”。之后墩墩能在放脚前表达需要帮忙，老师短暂扶到指定倒数后再松手。调整后墩墩可以自己站 10 秒以上。","focus":"继续把“累了/做不到”转成语言表达和求助，而不是直接放弃动作。"},{"item":"单脚跳","result":"连续 9 个","performance":"本节单脚跳最好连续 9 个，比前一节约 7 个有所提高。仍存在踩圈边问题：第 1、2 个和最后 1、2 个较能跳进圈里，中间较容易踩圈。","focus":"下一步重点仍是落点质量，不只增加数量。目标可设为“连续 9 个里至少 6 个跳进圈内”。"},{"item":"脚踏车灭火情境","result":"正骑双手端盘约 3 米；倒骑单手约 2 米","performance":"设置“去灭火”的小情境，从海洋球池装水，用小盘子端着水往前骑。正骑时需要双手端盘，最好连续约 3 米。骑行中说话较多，导致小球容易掉，掉后低头看又进一步影响盘中球稳定，捡球花费较多时间。倒骑为单手扶把，约连续 2 米；因墩墩提前把小盘子放回去，倒骑过程中没有端盘。","focus":"正骑双手端盘先保持 3 米，并减少骑行中说话和低头看；倒骑单手可从 2 米继续逐步增加。"}],"strengths":["入室状态较好，搬椅子较快，较前一节入室不配合有所改善。","能在两个任务中做选择，主动选择跳大龙球，任务启动较好。","跳大龙球 5 组中 3 组正确，多次重复目标数字后有帮助。","单脚站在老师引导求助后，可站 10 秒以上。","单脚跳最好连续 9 个，比前一节连续 7 个有所进步。","脚踏车正骑双手端盘可约 3 米，倒骑单手约 2 米，较 6 月 24 日倒骑单手 1 米有进步。"],"issues":["跳大龙球出现故意数错，说明规则意识和自我控制仍需稳定。","单脚站开始阶段会用“累了、换脚”来回避动作，需要继续练表达求助。","单脚跳数量增加，但中间落点仍容易踩圈边。","脚踏车骑行时说话较多，影响端盘稳定和注意力。","掉球后低头看、捡球花时间多，说明骑行中持续注视前方和保持任务目标仍需练习。"],"next":["跳大龙球继续练 16-20 个的计数，要求“数字顺序正确 + 到数停住”。","单脚站继续引导墩墩用语言表达“需要帮忙”，减少直接放脚或换脚。","单脚跳继续把重点放在落点，记录连续几个、其中几个真正跳进圈内。","脚踏车端盘时增加“骑车时嘴巴休息/眼睛看前方”的规则，减少说话导致掉球。","继续使用小情境和有限选择，但规则边界要稳定：数错不算，故意做不好需要重新完成。"]},{"date":"2026-06-27","title":"06月27日","overview":"本节课开头入室明显不顺。刚上课时墩墩不太想进教室，老师抱他时出现用脚踢老师的行为，后续由爸爸抱着进入教室。进教室后，老师先处理刚才踢老师的行为，要求墩墩道歉。老师观察到墩墩一开始兴趣不高、状态有些蔫。\n随后老师借用墩墩上节课喜欢的“包扎”游戏，设计“小医生/医院”情境。墩墩一听到要扮演小医生、玩包扎游戏，精神明显起来，并能按老师要求先道歉，再拿椅子放好、进入任务。整体看，本节课开头行为波动较大，但小情境非常有效，后续任务配合和运动表现都较好。","projects":[{"item":"入室与道歉","result":"入室困难；后续可道歉并进入任务","performance":"刚上课不太想进教室，老师抱时出现踢老师行为。爸爸抱进教室后，老师要求墩墩为踢到老师道歉。借助“小医生/包扎”情境后，墩墩兴趣被调动起来，可以按要求道歉，并把椅子放好。","focus":"入室拒绝和身体攻击需要单独重视。建议固定处理流程：先安全进入、冷静、道歉/修复，再进入情境任务。"},{"item":"剪纸做医院标志","result":"剪 2 个红十字","performance":"医院情境中，老师引出“医院门上和救护车上需要红十字标志”，让墩墩剪两个十字。直线剪得比较不错；遇到拐角、折角时不知道如何转向，容易斜着剪过去，需要老师提示和辅助。","focus":"剪纸可继续练直线和转角，重点练“剪到角-停一下-转纸/转方向-继续剪”。"},{"item":"单脚站","result":"可连续 10-15 秒","performance":"延续“运送医疗设备”的情境。站立时有时不稳会把脚放下，但本节较好的是，墩墩会主动说“老师需要帮帮忙”，没有直接放下就结束。当前单脚站可达到 10-15 秒。","focus":"继续巩固“站不稳先求助”，逐步减少辅助；可记录左右脚分别能站几秒。"},{"item":"单脚跳","result":"共 8 个圈；第一组前 5 个落点好","performance":"老师强调医疗器具珍贵，跳时不能踩圈边。本节单脚跳 8 个圈，第一组前 5 个都没有踩圈边，能踩到圈中心，非常好。但维持时间不长，后续仍会出现踩圈边。整体任务配合较好。","focus":"继续练落点质量，目标从“第一组前 5 个好”逐步扩展到整组 8 个尽量不踩圈边。"},{"item":"脚踏车救护车情境","result":"正骑不扶把约 3.8 米；倒骑约 7 米","performance":"设置“救护车送受伤小动物去医院”的情境。正骑时一只手拿担架床，一只手拿受伤小动物，相当于双手不扶把，连续约 3.8 米，距离提升不大，但身体明显更稳，不像之前一顿一顿、容易摇晃。老师用“小动物已经受伤，不能再严重受伤”的情境提醒后，墩墩能慢慢、稳稳骑。倒骑约 7 米，中间只有 1 次卡顿，整体速度较快但比较流畅。","focus":"正骑继续追求稳和身体控制，不只看距离；倒骑可继续记录卡顿次数，目标为 7 米内 0-1 次卡顿。"},{"item":"趴地推球 / 榨果汁情境","result":"连续 2 组，每组 40 个","performance":"该项目以前墩墩不太喜欢，因为较累。本节老师设置“医生午饭前榨蓝莓果汁、做面条”的情境，推 20 下小杯、30 下中杯、40 下大杯，让墩墩选择，墩墩选择 40。连续完成 2 组，每组 40 个。表现非常好：推球时双手一直抬得很高，没有落到地上；小脚看起来一直绷直，没有之前反复点地的情况。","focus":"这是本节最亮眼进步。后续继续记录数量和姿势质量，特别是手是否落地、脚是否点地、腿是否伸直。"}],"strengths":["虽然入室开头有明显波动，但“小医生/医院”情境能迅速调动兴趣，后续配合明显改善。","能在老师要求下为踢老师行为道歉，并完成椅子放置。","单脚站可达到 10-15 秒，并能主动说“老师帮帮忙”，求助表达延续了 6 月 26 日的进步。","单脚跳第一组前 5 个圈落点很好，能跳到圈中心。","脚踏车正骑不扶把约 3.8 米，身体稳定性比之前明显更好。","倒骑约 7 米，只有 1 次卡顿，流畅度较好。","趴地推球连续 2 组各 40 个，且手不落地、脚不点地，姿势质量非常突出。"],"issues":["入室拒绝和踢老师属于需要重点关注的行为边界问题，不能只看后续任务完成好。","开始时兴趣不足、状态偏低，需要更稳定的入室过渡方案。","剪纸转角能力需要练习，直线可以，拐角需要提示。","单脚跳落点质量还不能持续整组稳定，前半段好，后面容易踩圈边。","正骑不扶把距离仍在 3.8 米左右，距离提升不明显，但稳定性已有改善。"],"next":["入室流程需要单独设规则：不踢人、不推人、不用身体拒绝；如果不想进教室，用语言表达。","保留“小医生/医院”这类墩墩喜欢的情境，作为入室和困难任务的启动方式。","继续练“道歉/修复”流程，让墩墩理解行为后果，而不是只进入下一个游戏。","单脚跳继续把目标放在落点质量：8 个圈中尽量更多踩到中心。","脚踏车继续记录“距离 + 稳定性 + 卡顿次数”，尤其是正骑不扶把时身体是否摇晃。","趴地推球继续保持 40 个目标，但同时记录姿势质量，避免后续只追求数量。"]},{"date":"2026-06-29","title":"06月29日","overview":"本节课整体配合度较好，老师安排的任务墩墩基本都能跟随完成。训练重点包括单脚站/单脚跳、脚踏车、新增仰卧大龙球起身核心训练，以及趴地推球。整体看，墩墩在单脚站时间上有明确进步，左右脚都能达到 15 秒；脚踏车在屈膝踩踏技巧提示后更稳；新增核心屈曲训练暴露出腰腹力量仍需加强；趴地推球数量比 6 月 27 日下降，但整体姿势仍有可取之处。","projects":[{"item":"单脚站","result":"左右脚均达 15 秒","performance":"本节将单脚站目标从之前的 10 秒增加到 15 秒。刚开始左右脚都会有摇晃，大约站到 10-11 秒时身体会晃动；墩墩感觉站不稳时，能主动寻求老师帮助。老师约定“剩 4 秒时可以扶一下”，后面再站则需要自己完成。最终左右脚都能达到 15 秒。","focus":"继续巩固 15 秒目标，逐步减少最后几秒的扶助；记录左右脚稳定性和摇晃出现时间。"},{"item":"单脚跳","result":"本节有练习，未提供具体数量","performance":"作为第一个活动的一部分完成。老师重点反馈在单脚站，单脚跳未给出详细数据。","focus":"后续继续记录连续跳几个、其中几个落点踩到圈中心，避免只记录“做了”。"},{"item":"脚踏车","result":"正骑 2 组约 3 米；倒骑 1 组约 4 米","performance":"本节共 3 组，正骑 2 组、倒骑 1 组。老师教墩墩屈膝踩踏技巧：不要踮脚尖硬踩，而是屈膝降低重心，这样更稳。今天正骑约 3 米，倒骑约 4 米；骑行过程中小手有抬起来，没有一直扶把手。整体比之前更稳。","focus":"继续练屈膝踩踏和降低重心；记录是否踮脚、是否卡顿、是否能抬手不扶把。"},{"item":"新增：仰卧大龙球起身放物","result":"10 个中 3 个可独立起身","performance":"新增提高屈曲力量和整体核心力量的训练。墩墩仰卧在大龙球上，老师向前推球，让头逐渐接近地面，再要求他靠腰腹力量坐起，不能用手撑球。任务为拿触觉圆盘并放入后方大陀螺中，共 10 个。其中 3 个可以不用扶大陀螺自己起来，其余多数会用手肘撑在大龙球上借力坐起。不借力时起身较费力。","focus":"这是新的核心力量基线。后续重点记录 10 个中独立起身几个、借助手肘几个、是否能减少手肘撑球。"},{"item":"趴地推球 / 榨果汁情境","result":"原想 40 个，调整后完成 27 个","performance":"本节该项目做得较少。墩墩刚开始说要做 40 个，但第一组做到 16 个时小手抬不起来。老师降低难度为 30 个，设定为“中杯果汁”。墩墩最后成功推 27 个，最后 3 个手有放到下面。整体推球过程中姿势维持较好，小脚一直抬起；但双脚还不能很好并拢，需要后续提示。","focus":"根据当天体能灵活调整目标。继续记录手是否落地、脚是否抬起、双脚是否并拢；不要只看数量。"}],"strengths":["整体配合较好，老师安排的任务基本都能一起完成。","单脚站从 10 秒升级到 15 秒，左右脚都能达标，是明确进步。","站不稳时能主动寻求老师帮助，求助表达继续保持。","脚踏车在屈膝踩踏技巧提示后更稳，骑行时能抬手，不一直扶把。","新增核心训练能完成 10 个任务，其中 3 个可不借助支撑独立起身。","趴地推球虽然数量下降，但小脚能一直抬起，姿势仍有进步基础。"],"issues":["单脚站 10-11 秒后容易摇晃，15 秒后半段稳定性仍需加强。","脚踏车距离较 6 月 27 日有所下降，正骑约 3 米、倒骑约 4 米，但稳定性更好。","仰卧大龙球起身多数仍需手肘借力，腰腹屈曲力量需要继续练。","趴地推球从 6 月 27 日两组 40 个下降到本节 27 个，可能与前面核心训练疲劳有关，也可能是当天体能状态波动。","趴地推球双脚不太能并拢，需要持续提示。"],"next":["单脚站继续稳定 15 秒，重点看后 5 秒是否摇晃、是否需要扶。","脚踏车继续练屈膝踩踏、降低重心，目标先稳定骑行质量，再追距离。","仰卧大龙球起身作为新基线，目标先从 10 个中 3 个独立提高到 4-5 个独立。","趴地推球根据当天体能安排在合适位置，避免前面核心训练后疲劳过大影响表现。","推球继续记录姿势质量：手是否落地、脚是否抬起、双脚是否并拢。"]}];

const monthLabel=m=>{const [y,mo]=m.split('-');return y+'年'+Number(mo)+'月'};
function avg(rows,key){const vals=rows.map(r=>Number(r[key])).filter(v=>!Number.isNaN(v)&&v>0);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null}
function lastVal(rows,key){for(let i=rows.length-1;i>=0;i--){const v=Number(rows[i][key]);if(!Number.isNaN(v)&&v>0)return v}return null}
function firstVal(rows,key){for(const r of rows){const v=Number(r[key]);if(!Number.isNaN(v)&&v>0)return v}return null}
function delta(rows,key){const a=firstVal(rows,key),b=lastVal(rows,key);return a!=null&&b!=null?b-a:null}
function tipAttr(date,name,value,unit){return ' data-tip-date="'+fmt(date)+'" data-tip-name="'+name+'" data-tip-value="'+value+(unit||'')+'"'}
function lineSvg(rows, series, max=5, unit='分'){if(!rows.length)return '<div class="empty">暂无可绘制的数据</div>';
 const W=720,H=288,legendCols=series.length>3?2:3,legendRows=Math.ceil(series.length/legendCols),p={l:44,r:18,t:34+legendRows*20,b:38},cw=W-p.l-p.r,ch=H-p.t-p.b;
 const x=i=>p.l+(rows.length===1?cw/2:i*cw/(rows.length-1)); const y=v=>p.t+(max-v)*ch/max;
 let s='<svg viewBox="0 0 '+W+' '+H+'" class="chart" role="img">';
 for(let i=0;i<=5;i++){let v=max*i/5,yy=y(v);s+='<line x1="'+p.l+'" y1="'+yy+'" x2="'+(W-p.r)+'" y2="'+yy+'" stroke="#e2e8f0"/><text x="'+(p.l-10)+'" y="'+(yy+4)+'" text-anchor="end" font-size="11" fill="#64748b">'+Math.round(v)+'</text>'}
 rows.forEach((r,i)=>s+='<text x="'+x(i)+'" y="'+(H-13)+'" text-anchor="middle" font-size="10" fill="#64748b">'+fmt(r.date).replace('月','/').replace('日','')+'</text>');
 series.forEach(sr=>{let pts=[];rows.forEach((r,i)=>{let v=Number(r[sr.key]);if(!Number.isNaN(v)&&v>0)pts.push([x(i),y(v),v,r.date])});if(pts.length){s+='<polyline points="'+pts.map(p=>p[0]+','+p[1]).join(' ')+'" fill="none" stroke="'+sr.color+'" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>';pts.forEach(p=>{const tip=tipAttr(p[3],sr.name,p[2],unit);s+='<circle class="chart-point-hit" cx="'+p[0]+'" cy="'+p[1]+'" r="12"'+tip+'></circle><circle class="chart-point" cx="'+p[0]+'" cy="'+p[1]+'" r="4.5" fill="'+sr.color+'"'+tip+'></circle>'})}});
 series.forEach((sr,i)=>{const lx=p.l+(i%legendCols)*190,ly=18+Math.floor(i/legendCols)*20;s+='<rect x="'+lx+'" y="'+ly+'" width="10" height="10" rx="2" fill="'+sr.color+'"/><text x="'+(lx+16)+'" y="'+(ly+9)+'" font-size="12" fill="#334155">'+sr.name+'</text>'});
 return s+'</svg>'
}
function barSvg(rows,key,max,label){if(!rows.length)return '<div class="empty">暂无可绘制的数据</div>';const W=720,H=236,p={l:44,r:18,t:38,b:38},cw=W-p.l-p.r,ch=H-p.t-p.b;const vals=rows.map(r=>Number(r[key]));const bw=Math.max(14,cw/rows.length*.55);const y=v=>p.t+(max-v)*ch/max;let s='<svg viewBox="0 0 '+W+' '+H+'" class="chart small"><rect x="'+p.l+'" y="15" width="10" height="10" rx="2" fill="#0f766e"/><text x="'+(p.l+16)+'" y="24" font-size="12" fill="#334155">'+label+'</text>';for(let i=0;i<=4;i++){let v=max*i/4,yy=y(v);s+='<line x1="'+p.l+'" y1="'+yy+'" x2="'+(W-p.r)+'" y2="'+yy+'" stroke="#e2e8f0"/><text x="'+(p.l-10)+'" y="'+(yy+4)+'" text-anchor="end" font-size="11" fill="#64748b">'+Math.round(v)+'</text>'}rows.forEach((r,i)=>{let v=Number(r[key]),xx=p.l+(i+.5)*cw/rows.length;s+='<text x="'+xx+'" y="'+(H-13)+'" text-anchor="middle" font-size="10" fill="#64748b">'+fmt(r.date).replace('月','/').replace('日','')+'</text>';if(!Number.isNaN(v)&&v>0){const tip=tipAttr(r.date,label,v,'');s+='<rect class="chart-bar" x="'+(xx-bw/2)+'" y="'+y(v)+'" width="'+bw+'" height="'+(H-p.b-y(v))+'" rx="4" fill="#0f766e"'+tip+'></rect><text x="'+xx+'" y="'+(y(v)-6)+'" text-anchor="middle" font-size="11" fill="#334155">'+v+'</text>'}});return s+'</svg>'}
function renderMonthSwitch(){const root=document.getElementById('monthSwitch');if(!root)return;const idx=monthKeys.indexOf(visibleMonth);root.innerHTML='<button id="prevMonth" '+(idx<=0?'disabled':'')+'>‹</button><select id="monthSelect">'+monthKeys.map(m=>'<option value="'+m+'" '+(m===visibleMonth?'selected':'')+'>'+monthLabel(m)+'</option>').join('')+'</select><button id="nextMonth" '+(idx>=monthKeys.length-1?'disabled':'')+'>›</button>';document.getElementById('prevMonth').onclick=()=>{if(idx>0){visibleMonth=monthKeys[idx-1];renderCalendar()}};document.getElementById('nextMonth').onclick=()=>{if(idx<monthKeys.length-1){visibleMonth=monthKeys[idx+1];renderCalendar()}};document.getElementById('monthSelect').onchange=e=>{visibleMonth=e.target.value;renderCalendar()}}
function renderCalendar(){renderMonthSwitch();const root=document.getElementById('calendars');root.innerHTML='';const [year,monthNum]=visibleMonth.split('-').map(Number);const month=monthNum-1;const title=monthLabel(visibleMonth);const wrap=document.createElement('div');wrap.className='month';wrap.innerHTML='<h2><span>'+title+'</span><span class="tag">'+courseDates.filter(d=>d.slice(0,7)===visibleMonth).length+' 次</span></h2><div class="week"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div><div class="grid"></div>';const grid=wrap.querySelector('.grid');const first=new Date(year,month,1);const start=(first.getDay()+6)%7;const days=new Date(year,month+1,0).getDate();for(let i=0;i<start;i++){const d=document.createElement('div');d.className='day';grid.appendChild(d)}for(let day=1;day<=days;day++){const date=year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');const b=document.createElement('button');b.className='day '+(byDate[date]?'has':'')+(selected.includes(date)?' selected':'');b.textContent=day;b.disabled=!byDate[date];b.onclick=()=>{if(selected.length===courseDates.length){selected=[date]}else if(selected.includes(date)){selected=selected.filter(x=>x!==date)}else{selected=[...selected,date].sort()}if(!selected.length) selected=[date];render();if(window.matchMedia('(max-width:700px)').matches){document.querySelector('.main').scrollIntoView({behavior:'smooth',block:'start'})}};grid.appendChild(b)}root.appendChild(wrap)}
function selectedRows(){return trend.filter(r=>selected.includes(r.date))}
function selectedRecords(){return records.filter(r=>selected.includes(r.date))}
function renderMetrics(rows){const metrics=[['课程数',selected.length+' 次','当前选择'],['规则均分',avg(rows,'rule_score_1_5')?.toFixed(1)||'-','1-5 趋势评分'],['任务均分',avg(rows,'task_completion_1_5')?.toFixed(1)||'-','完成质量'],['单脚站',lastVal(rows,'single_stand_seconds')?lastVal(rows,'single_stand_seconds')+' 秒':'-','最近记录']];document.getElementById('summaryMetrics').innerHTML=metrics.map(m=>'<div class="metric"><b>'+m[0]+'</b><strong>'+m[1]+'</strong><br><span>'+m[2]+'</span></div>').join('')}
function trendNarrative(rows){const rule=delta(rows,'rule_score_1_5'),task=delta(rows,'task_completion_1_5'),stand=lastVal(rows,'single_stand_seconds'),push=lastVal(rows,'push_ball_count');let arr=[];if(rule!=null)arr.push('规则执行较起点'+(rule>=0?'提升 ':'下降 ')+Math.abs(rule).toFixed(1)+' 分');if(task!=null)arr.push('任务完成较起点'+(task>=0?'提升 ':'下降 ')+Math.abs(task).toFixed(1)+' 分');if(stand)arr.push('单脚站最近达到 '+stand+' 秒');if(push)arr.push('趴地推球最近记录 '+push+' 个');return arr.length?arr:'当前选择的数据较少，建议查看单日课堂详情。'}
function renderTrend(){const rows=selectedRows();return '<div class="layout"><div><div class="panel"><div class="section-title"><h3>课堂执行稳定性</h3><span class="tag">'+selected.length+' 次课</span></div><p class="chart-note">看规则、配合和任务完成是否一起变稳。</p>'+lineSvg(rows,[{key:'rule_score_1_5',name:'规则',color:'#2563eb'},{key:'cooperation_1_5',name:'配合',color:'#dc2626'},{key:'task_completion_1_5',name:'任务',color:'#059669'}],5,'分')+'</div><div class="panel"><h3>平衡与下肢控制</h3><p class="chart-note">看单脚站时间和单脚跳连续次数，主要对应平衡、下肢控制和身体稳定。</p>'+lineSvg(rows,[{key:'single_stand_seconds',name:'单脚站',color:'#2563eb'},{key:'single_hop_count',name:'单脚跳',color:'#dc2626'}],16,'')+'</div><div class="panel"><h3>骑车控制</h3><p class="chart-note">看距离，也要结合课堂描述里的速度、卡顿、扶把和身体摇晃。</p>'+lineSvg(rows,[{key:'bike_forward_m',name:'正骑',color:'#2563eb'},{key:'bike_backward_m',name:'倒骑',color:'#059669'},{key:'bike_no_hands_or_context_m',name:'不扶/情境骑',color:'#d97706'},{key:'bike_backward_one_hand_m',name:'倒骑单手',color:'#7c3aed'}],9,'米')+'</div><div class="panel"><h3>视觉时机与任务准确率</h3><p class="chart-note">看“眼睛看目标、听口令、按时机行动”是否更稳定。</p>'+lineSvg(rows,[{key:'spoon_success_rate_pct',name:'勺子运物',color:'#059669'},{key:'basket_success_rate_pct',name:'投篮命中',color:'#2563eb'},{key:'trampoline_count_accuracy_pct',name:'计数准确',color:'#d97706'}],100,'%')+'</div><div class="panel"><h3>核心力量与姿势耐力</h3><p class="chart-note">推球只放在这里看：数量只是一个线索，还要结合手是否落地、脚是否点地、姿势是否标准。</p>'+lineSvg(rows,[{key:'airplane_seconds',name:'小飞机坚持',color:'#2563eb'},{key:'push_ball_count',name:'趴地推球',color:'#0f766e'}],45,'')+'</div><div class="panel"><h3>规则迁移与提示效果</h3><p class="chart-note">看课堂规则能否迁移成自动行为，以及情境/辅助是否能帮助他回到任务。</p>'+lineSvg(rows,[{key:'seat_after_task_1_5',name:'回座位',color:'#059669'},{key:'support_effect_0_5',name:'情境/辅助有效性',color:'#dc2626'}],5,'分')+'</div></div><aside><div class="panel"><h3>趋势摘要</h3><ul class="list">'+trendNarrative(rows).map(x=>'<li>'+x+'</li>').join('')+'</ul></div><div class="panel"><h3>分类后怎么看</h3><ul class="list"><li>课堂执行看“愿不愿意进入任务、能不能完成最后一步”。</li><li>运动控制看“能不能稳”，不是只看距离或次数。</li><li>准确率看“是否按目标完成”，适合判断能力迁移。</li><li>核心力量看姿势质量，推球数量不能单独解释进步。</li><li>提示效果高说明方法有效，下一步是逐步减少提示。</li></ul></div><div class="panel"><h3>主要关注点</h3><div class="chips">'+rows.map(r=>'<span class="chip">'+fmt(r.date)+'：'+r.main_issue+'</span>').join('')+'</div></div></aside></div>'}
function renderDetail(){const recs=selectedRecords();if(!recs.length)return '<div class="empty">请选择一个或多个上课日期</div>';return '<div class="records">'+recs.map(r=>'<article class="panel"><div class="section-title"><h3>'+fmt(r.date)+' 课堂详情</h3><span class="tag">'+(r.projects.length)+' 个项目</span></div><p>'+r.overview.split('\\n').join('<br>')+'</p><h3>项目记录</h3>'+r.projects.map(p=>'<div class="project"><h4>'+p.item+'</h4><dl><dt>完成</dt><dd>'+p.result+'</dd><dt>表现</dt><dd>'+p.performance+'</dd><dt>重点</dt><dd>'+p.focus+'</dd></dl></div>').join('')+'<div class="twocol"><div><h3>优势</h3><ul class="list">'+r.strengths.map(x=>'<li>'+x+'</li>').join('')+'</ul></div><div><h3>待改进</h3><ul class="list">'+r.issues.map(x=>'<li>'+x+'</li>').join('')+'</ul></div></div><h3>下节课重点</h3><ul class="list">'+r.next.map(x=>'<li>'+x+'</li>').join('')+'</ul></article>').join('')+'</div>'}
function renderAdvice(){return '<div class="layout"><div class="panel"><h3>给家长的家庭配合</h3><div class="advice">'+parentAdvice.map((a,i)=>'<div class="advice-item '+(i%2?'green':'')+'"><b>'+a[0]+'</b><span>'+a[1]+'</span></div>').join('')+'</div></div><div class="panel"><h3>给幼儿园老师的配合建议</h3><div class="advice">'+teacherAdvice.map((a,i)=>'<div class="advice-item '+(i%2?'amber':'green')+'"><b>'+a[0]+'</b><span>'+a[1]+'</span></div>').join('')+'</div></div></div><div class="panel"><h3>当前选择下的建议侧重</h3><ul class="list">'+recommendForSelection().map(x=>'<li>'+x+'</li>').join('')+'</ul></div>'}
function recommendForSelection(){const rows=selectedRows();const issues=rows.map(r=>r.main_issue).join('、');let out=[];if(/切换|入室|踢/.test(issues))out.push('把入室、起床、刷牙、排队都做成固定流程，先处理安全边界，再进入任务。');if(/核心|推球|抬头|姿势/.test(issues))out.push('继续追踪核心力量：趴地推球、仰卧起身、手不落地和脚不点地，比单纯次数更重要。');if(/数|计数/.test(issues))out.push('计数任务分清“记不住”和“故意数错”：前者降低难度和重复目标，后者数错不算、重新来。');if(/求助/.test(issues))out.push('把“帮我一下、休息10秒、我再试一次”作为替代行为反复练。');if(!out.length)out.push('继续保持小情境和有限选择，稳定规则后逐步减少提示。');return out}
function scoreWidth(x){if(x.levelClass==='high')return 92;if(x.levelClass==='mid')return 70;return 38}
function renderReport(){return '<div class="report-hero"><div class="report-card"><h3>一眼结论</h3><div class="verdict"><div class="verdict-item"><b>先看优势</b><span>报告里不是全是短板。墩墩的抓握达到5岁11个月水平，精细运动商高于平均，计划和想法处于正常范围。</span></div><div class="verdict-item"><b>是否对症</b><span>目前课程内容和评估报告里的主要弱项是对得上的，尤其是前庭平衡、核心力量、身体控制、视觉注视和规则等待。</span></div><div class="verdict-item"><b>怎么理解</b><span>孩子有不错的手部和部分运动基础，难点更多在调节、切换、等待、姿势维持和把能力稳定用出来。</span></div></div></div><div class="report-card"><h3>优先级</h3><ul class="list"><li>第一优先：规则、切换、等待和安全边界。</li><li>第二优先：核心力量和姿势质量。</li><li>第三优先：视觉注视、听口令、按时机行动。</li><li>触觉和刷牙：需要家庭每天稳定练，课堂只能辅助。</li></ul></div></div><div class="panel"><h3>评估报告里的优势资源</h3><div class="strength-grid">'+reportStrengths.map(x=>'<div class="strength-card"><b>'+x.name+'</b><strong>'+x.value+'</strong><span>'+x.detail+'</span></div>').join('')+'</div><p class="footer-note">这些优势很重要：后续训练可以多借助手部操作、角色任务、可视化材料和小情境，而不是只靠口头要求孩子“听话”。</p></div><div class="domain-grid">'+reportInsights.map(x=>'<div class="domain-card"><div class="domain-head"><h3>'+x.name+'</h3><span class="level '+x.levelClass+'">'+x.level+'</span></div><div class="score-row"><span>'+x.score+'</span><div class="score-track"><div class="score-fill '+x.levelClass+'" style="width:'+scoreWidth(x)+'%"></div></div><strong>'+x.status+'</strong></div><div class="domain-cols"><div class="note-box"><b>评估说什么</b><span>'+x.report+'</span></div><div class="note-box"><b>课堂有没有练到</b><span>'+x.class+'</span></div></div><div class="note-box" style="margin-top:10px"><b>下一步看什么</b><span>'+x.next+'</span></div></div>').join('')+'</div><div class="panel"><h3>家园协同动作</h3><div class="action-strip"><div class="action-card"><b>家长在家</b><span>固定流程、有限选择、短倒计时。刷牙、起床、出门都用同一套步骤，不每天重新谈判。</span></div><div class="action-card green"><b>幼儿园老师</b><span>短指令和提前预告。把排队、收玩具、洗手做成可预测流程，给他小帮手角色。</span></div><div class="action-card amber"><b>感统老师</b><span>继续保留小情境，但记录姿势质量和提示量，逐步把“老师提醒”变成“墩墩自己说出方法”。</span></div></div><p class="footer-note">说明：这里用于家长和老师沟通训练方向，不替代医生或治疗师的正式判断。</p></div>'}
function renderContent(){if(mode==='detail')return renderDetail();if(mode==='advice')return renderAdvice();if(mode==='report')return renderReport();return renderTrend()}
function render(){renderCalendar();const all=selected.length===courseDates.length;document.getElementById('viewTitle').textContent=all?'全部课程趋势总结':selected.length===1?fmt(selected[0])+' 课堂记录':selected.length+' 天课程趋势对比';document.getElementById('viewSubtitle').textContent=all?'已汇总全部上课日期，适合看整体进展和家园建议。':'当前选择：'+selected.map(fmt).join('、');renderMetrics(selectedRows());document.getElementById('content').innerHTML=renderContent();document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));}
function chartTip(){let tip=document.getElementById('chartTip');if(!tip){tip=document.createElement('div');tip.id='chartTip';document.body.appendChild(tip)}return tip}
function showChartTip(target,event){const tip=chartTip();tip.innerHTML='<b>'+target.dataset.tipName+'：'+target.dataset.tipValue+'</b><span>'+target.dataset.tipDate+'</span>';tip.style.display='block';const x=Math.min(event.clientX+12,window.innerWidth-236);const y=Math.max(12,event.clientY-54);tip.style.left=x+'px';tip.style.top=y+'px';document.querySelectorAll('.chart-point.active').forEach(el=>el.classList.remove('active'));if(target.classList.contains('chart-point'))target.classList.add('active')}
document.addEventListener('click',e=>{const target=e.target.closest('[data-tip-date]');if(target){showChartTip(target,e);return}const tip=document.getElementById('chartTip');if(tip)tip.style.display='none'})
document.getElementById('selectAll').onclick=()=>{selected=[...courseDates];mode='trend';render()};document.getElementById('clearSel').onclick=()=>{selected=[];render()};document.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;render()});render();
</script>
</body>
